<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuSmart TITAN | Gastronomy OS</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">

    <style>
        :root { --p: #FF5C00; --bg: #030303; --accent: #1a1a1a; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            overflow: hidden; 
            height: 100vh;
            -webkit-user-select: none;
        }

        /* Fluid Background with Mesh Gradients */
        .mesh-bg {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(255, 92, 0, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 92, 0, 0.1) 0px, transparent 50%);
            filter: blur(80px);
        }

        /* Glass Container for Navigation */
        .titan-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; height: 85px;
            background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 40px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .nav-item { 
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: #555; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-item.active { color: var(--p); transform: translateY(-12px); }
        .nav-item i { font-size: 1.4rem; }
        .nav-label { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* Dynamic Cards */
        .titan-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 35px;
            padding: 24px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }
        .titan-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.05); }

        /* QR Live Pulse */
        #qr-mini-preview {
            background: white; padding: 10px; border-radius: 18px;
            box-shadow: 0 0 30px rgba(255, 92, 0, 0.3);
        }

        .section-view { display: none; height: 100vh; overflow-y: auto; padding-bottom: 150px; }
        .section-view.active { display: block; animation: viewIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }

        @keyframes viewIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">

    <div class="mesh-bg"></div>

    <div id="app-shell">
        
        <section id="view-dash" class="section-view active p-6">
            <header class="flex justify-between items-end mb-10 pt-10">
                <div>
                    <h2 class="text-zinc-500 text-[10px] font-black uppercase tracking-[5px]">Mirësevini në</h2>
                    <h1 class="text-4xl font-black italic tracking-tighter">TITAN <span class="text-orange-600">OS</span></h1>
                </div>
                <div class="w-12 h-12 bg-white rounded-2xl overflow-hidden border-2 border-orange-600 shadow-2xl">
                    <img id="global-logo" src="https://ui-avatars.com/api/?name=RS" class="w-full h-full object-cover">
                </div>
            </header>

            <div class="grid grid-cols-2 gap-4">
                <div class="titan-card col-span-2 flex items-center justify-between bg-gradient-to-br from-orange-600/20 to-transparent border-orange-600/20">
                    <div>
                        <h3 class="font-black text-xl italic uppercase">Kodi Live</h3>
                        <p class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest mt-1">Skano & Testo Real-time</p>
                    </div>
                    <div id="qr-mini-preview"></div>
                </div>

                <div class="titan-card h-48 flex flex-col justify-between" onclick="switchView('view-ads')">
                    <div class="w-10 h-10 bg-blue-600/20 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-bolt-lightning text-blue-500"></i>
                    </div>
                    <div>
                        <h4 class="font-black text-sm uppercase">Ad-Pulse</h4>
                        <p class="text-[10px] text-zinc-500">Krijo Ofertat</p>
                    </div>
                </div>

                <div class="titan-card h-48 flex flex-col justify-between" onclick="switchView('view-studio')">
                    <div class="w-10 h-10 bg-orange-600/20 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-wand-magic-sparkles text-orange-600"></i>
                    </div>
                    <div>
                        <h4 class="font-black text-sm uppercase">Studio</h4>
                        <p class="text-[10px] text-zinc-500">Arkitektura Menusë</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-studio" class="section-view p-6">
            <h2 class="text-3xl font-black italic mb-8">ARKITEKTURA</h2>
            
            <div class="titan-card mb-6">
                <input type="text" id="biz-name" oninput="syncTitan()" placeholder="Emri i Lokalit" class="w-full bg-transparent border-b border-zinc-800 p-4 text-xl font-bold focus:outline-none focus:border-orange-600 transition">
                <div class="flex gap-4 mt-6">
                    <button onclick="document.getElementById('logo-up').click()" class="flex-1 py-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase tracking-widest">Ngarko Logon</button>
                    <input type="file" id="logo-up" class="hidden" onchange="updateLogo(event)">
                </div>
            </div>

            <div id="category-list" class="space-y-4">
                </div>

            <button onclick="addCategory()" class="w-full py-6 mt-6 border-2 border-dashed border-zinc-800 rounded-3xl text-zinc-500 font-black uppercase text-[10px] hover:border-orange-600 hover:text-orange-600 transition">+ Shto Kategori</button>
        </section>

        <section id="view-ads" class="section-view p-6">
            <h2 class="text-3xl font-black italic mb-8 text-blue-500">AD-PULSE</h2>
            <div class="titan-card bg-blue-600/5 border-blue-600/20 mb-6">
                <p class="text-[10px] font-black uppercase tracking-[3px] text-blue-400 mb-4">Promocioni Aktiv</p>
                <div class="relative h-40 bg-zinc-900 rounded-3xl overflow-hidden border border-white/5">
                    <img id="ad-preview-img" src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=500&q=80" class="w-full h-full object-cover opacity-50">
                    <div class="absolute inset-0 p-6 flex flex-col justify-end">
                        <h4 id="ad-text-preview" class="text-xl font-black uppercase italic">Happy Hour -50%</h4>
                    </div>
                </div>
            </div>
            
            <div class="titan-card space-y-4">
                <input type="text" id="ad-title" oninput="updateAd()" placeholder="Titulli i Ofertës" class="w-full bg-black/40 p-4 rounded-2xl border border-white/5 focus:outline-none">
                <button class="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl shadow-blue-600/20">Shpërndaj në Social Media</button>
            </div>
        </section>

    </div>

    <nav class="titan-nav">
        <div onclick="switchView('view-dash')" class="nav-item active" id="nav-dash">
            <i class="fa-solid fa-house-user"></i>
            <span class="nav-label">Home</span>
        </div>
        <div onclick="switchView('view-studio')" class="nav-item" id="nav-studio">
            <i class="fa-solid fa-layer-group"></i>
            <span class="nav-label">Studio</span>
        </div>
        <div onclick="switchView('view-ads')" class="nav-item" id="nav-ads">
            <i class="fa-solid fa-bullhorn"></i>
            <span class="nav-label">Ads</span>
        </div>
        <div onclick="window.location.href='live-menu.html'" class="nav-item">
            <i class="fa-solid fa-up-right-from-square"></i>
            <span class="nav-label">Live</span>
        </div>
    </nav>

    <script>
        // CORE STATE
        let titanData = {
            name: "Lokal i Ri",
            logo: "",
            categories: [{id: 1, name: "Specialitete", items: [{name: "Titan Burger", price: 12}]}],
            ad: { title: "Oferta e Fundjavës" }
        };

        // VIEW CONTROLLER
        function switchView(viewId) {
            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const activeNav = viewId.replace('view-', 'nav-');
            if(document.getElementById(activeNav)) document.getElementById(activeNav).classList.add('active');
            
            gsap.from(`#${viewId} > *`, { y: 20, opacity: 0, stagger: 0.1, duration: 0.5 });
        }

        // SYNC ENGINE
        function syncTitan() {
            titanData.name = document.getElementById('biz-name').value;
            localStorage.setItem('Titan_State', JSON.stringify(titanData));
            updateQR();
        }

        function updateLogo(e) {
            const reader = new FileReader();
            reader.onload = () => {
                titanData.logo = reader.result;
                document.getElementById('global-logo').src = reader.result;
                syncTitan();
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function updateQR() {
            const qrCont = document.getElementById('qr-mini-preview');
            qrCont.innerHTML = "";
            new QRCode(qrCont, {
                text: "https://menusmart.io/preview", // Dinamikisht këtu do shkonte linku real
                width: 80,
                height: 80,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function updateAd() {
            const val = document.getElementById('ad-title').value;
            document.getElementById('ad-text-preview').innerText = val;
        }

        // STARTUP
        window.onload = () => {
            updateQR();
            gsap.from(".titan-nav", { y: 150, duration: 1.2, ease: "expo.out" });
        };
    </script>
</body>
</html>
