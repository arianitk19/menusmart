<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuSmart PRO | OS</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MenuSmart">

<link rel="apple-touch-icon" href="icon-512.png">

<meta name="theme-color" content="#000000">
    
    <style>
        :root { --p: #FF5C00; --bg: #000; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }

        /* Canvas Background for Dynamic Particles */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        .bento-card {
            background: rgba(20, 20, 20, 0.7);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Glassmorphism Navigation */
        .app-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 450px; height: 75px;
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000;
        }

        .active-dot { position: absolute; bottom: -8px; width: 4px; height: 4px; background: var(--p); border-radius: 50%; }
        
        /* Smooth Scrolling */
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="hide-scroll">

    <canvas id="bg-canvas"></canvas>

    <header class="p-6 flex justify-between items-center fixed top-0 w-full z-50 bg-black/20 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center font-black italic">M</div>
            <h1 class="font-black text-lg tracking-tighter">MenuSmart <span class="text-orange-600">PRO</span></h1>
        </div>
        <div class="flex gap-4">
            <i class="fa-solid fa-bell text-zinc-500"></i>
            <div class="w-6 h-6 rounded-full bg-zinc-800 border border-white/10"></div>
        </div>
    </header>

    <main class="pt-28 px-5 pb-32 space-y-6">
        
        <section class="grid grid-cols-2 gap-4">
            <div class="bento-card col-span-2 h-32 flex flex-row items-center justify-between bg-gradient-to-r from-orange-600/20 to-transparent">
                <div>
                    <p class="text-[10px] font-bold text-orange-500 uppercase tracking-[3px]">Trafiku Live</p>
                    <h2 class="text-4xl font-black tabular-nums" id="live-counter">482</h2>
                    <p class="text-[10px] text-zinc-500">Skanime në 24 orët e fundit</p>
                </div>
                <div class="flex gap-1 items-end h-12">
                    <div class="w-1 bg-orange-600 h-1/2 rounded-full animate-bounce"></div>
                    <div class="w-1 bg-orange-600 h-full rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-1 bg-orange-600 h-2/3 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>

            <a href="builder.html" class="bento-card h-44 flex flex-col justify-between group active:scale-95 transition">
                <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center group-hover:bg-orange-600 transition">
                    <i class="fa-solid fa-wand-magic-sparkles text-orange-600 group-hover:text-white"></i>
                </div>
                <div>
                    <h3 class="font-black text-sm uppercase">Studio</h3>
                    <p class="text-[10px] text-zinc-500">Edito Menunë</p>
                </div>
            </a>

            <a href="qr-code.html" class="bento-card h-44 flex flex-col justify-between active:scale-95 transition">
                <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-qrcode text-white"></i>
                </div>
                <div>
                    <h3 class="font-black text-sm uppercase">QR Engine</h3>
                    <p class="text-[10px] text-zinc-500">Printo Kodin</p>
                </div>
            </a>

            <div class="bento-card col-span-2 bg-zinc-900/30">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="text-xs font-black uppercase tracking-widest text-zinc-400">Inventory Alert</h4>
                    <span class="text-[9px] bg-red-500/20 text-red-500 px-2 py-0.5 rounded-full">3 Artikuj Low</span>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between text-xs">
                        <span class="text-zinc-300">Filetë Viçi</span>
                        <span class="font-bold text-red-500">2kg mbetur</span>
                    </div>
                    <div class="w-full h-1 bg-zinc-800 rounded-full overflow-hidden">
                        <div class="w-1/5 h-full bg-red-500"></div>
                    </div>
                </div>
            </div>

            <div class="bento-card col-span-2 h-24 flex items-center gap-4 bg-blue-600/10 border-blue-600/20">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-xl">
                    <i class="fa-solid fa-bullhorn text-white"></i>
                </div>
                <div>
                    <h4 class="font-black text-sm uppercase">Marketing Hub</h4>
                    <p class="text-[10px] text-zinc-500">Dërgo oferta në WhatsApp</p>
                </div>
                <i class="fa-solid fa-chevron-right ml-auto text-zinc-700"></i>
            </div>
        </section>
    </main>

    <nav class="app-nav">
        <a href="#" class="relative flex flex-col items-center text-orange-600">
            <i class="fa-solid fa-house-chimney text-xl"></i>
            <div class="active-dot"></div>
        </a>
        <a href="builder.html" class="flex flex-col items-center text-zinc-500">
            <i class="fa-solid fa-plus-square text-xl"></i>
        </a>
        <a href="qr-code.html" class="flex flex-col items-center text-zinc-500">
            <i class="fa-solid fa-qrcode text-xl"></i>
        </a>
        <a href="analytics.html" class="flex flex-col items-center text-zinc-500">
            <i class="fa-solid fa-chart-line text-xl"></i>
        </a>
    </nav>

    <script>
        // 1. REGISTER SERVICE WORKER (Bën App-in real)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // 2. DYNAMIC PARTICLES BACKGROUND
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x > canvas.width) this.x = 0;
                if(this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 92, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            for(let i=0; i<50; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas(); createParticles(); animate();

        // 3. LIVE COUNTER ANIMATION
        let count = 482;
        setInterval(() => {
            count += Math.floor(Math.random() * 3);
            document.getElementById('live-counter').innerText = count;
        }, 3000);

        // GSAP ENTRANCE
        gsap.from(".bento-card", { y: 30, opacity: 0, stagger: 0.1, duration: 1, ease: "expo.out" });
    </script>
</body>
</html>
