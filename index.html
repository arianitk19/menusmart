<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuSmart PRO | Enterprise OS</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --p: #FF5C00; --bg: #000; --card: rgba(10, 10, 10, 0.6); }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            overflow: hidden; 
            height: 100vh;
            perspective: 1000px;
        }

        /* Abstract Dynamic Background */
        .bg-orb {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255, 92, 0, 0.15) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px); z-index: -1;
        }

        /* Glassmorphism Ultra-Refined */
        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
        }

        /* Hover & Interaction Effects */
        .main-card {
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .main-card:hover {
            transform: translateY(-10px) rotateX(5deg);
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--p);
        }

        /* Typography Masterclass */
        .title-gradient {
            background: linear-gradient(180deg, #fff 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Nav Dock like iPhone */
        .dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 85px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 42px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 100;
        }

        .dock-item {
            font-size: 1.5rem; color: #444; transition: 0.4s;
            position: relative; width: 50px; height: 50px;
            display: flex; items-center; justify-content: center;
        }
        .dock-item.active { color: var(--p); }
        .dock-item.active::after {
            content: ''; position: absolute; bottom: -10px; width: 5px; height: 5px;
            background: var(--p); border-radius: 50%; box-shadow: 0 0 15px var(--p);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="bg-orb" id="orb1" style="top: -200px; left: -200px;"></div>
    <div class="bg-orb" id="orb2" style="bottom: -200px; right: -200px; background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);"></div>

    <div class="p-8 pt-16 max-w-lg mx-auto h-full flex flex-col">
        
        <header class="flex justify-between items-center mb-12">
            <div>
                <span class="text-[10px] font-black tracking-[6px] text-zinc-500 uppercase">System Status</span>
                <div class="flex items-center gap-2 mt-1">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-xs font-bold text-zinc-300">Live & Secure</span>
                </div>
            </div>
            <div class="w-12 h-12 glass-panel flex items-center justify-center border-zinc-800">
                <i class="fa-solid fa-bolt text-orange-600"></i>
            </div>
        </header>

        <div class="mb-12">
            <h1 class="text-5xl font-black title-gradient leading-[0.9] tracking-tighter italic">
                MENUSMART<br><span class="text-white">OS v.3</span>
            </h1>
            <p class="mt-4 text-zinc-500 text-sm font-medium max-w-[250px] leading-relaxed">
                Platforma definitive për arkitekturën e gastronomisë moderne.
            </p>
        </div>

        <div class="grid grid-cols-2 gap-5 mb-32">
            
            <div onclick="window.location.href='builder.html'" class="main-card col-span-2 h-44 glass-panel p-8 flex flex-col justify-between border-orange-600/20 relative group">
                <div class="absolute top-0 right-0 p-6 opacity-10 group-hover:opacity-100 transition-opacity">
                    <i class="fa-solid fa-wand-magic-sparkles text-4xl"></i>
                </div>
                <div>
                    <h3 class="text-2xl font-black tracking-tighter uppercase italic">Studio</h3>
                    <p class="text-xs text-zinc-500 font-bold uppercase tracking-widest">Ndërto Menunë</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black text-orange-600 uppercase tracking-widest">Hyr në Studio</span>
                    <i class="fa-solid fa-arrow-right-long text-orange-600"></i>
                </div>
            </div>

            <div onclick="window.location.href='analytics.html'" class="main-card h-52 glass-panel p-6 flex flex-col justify-between">
                <div class="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-chart-line text-zinc-400"></i>
                </div>
                <div>
                    <h3 class="text-lg font-black tracking-tighter uppercase italic">Data</h3>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Analitika Live</p>
                </div>
            </div>

            <div onclick="window.location.href='qr-code.html'" class="main-card h-52 glass-panel p-6 border-zinc-800/50 flex flex-col justify-between bg-zinc-900/20">
                <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center shadow-lg shadow-orange-600/20">
                    <i class="fa-solid fa-qrcode text-white"></i>
                </div>
                <div>
                    <h3 class="text-lg font-black tracking-tighter uppercase italic">Forge</h3>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Gjenero QR</p>
                </div>
            </div>

            <div class="main-card col-span-2 h-28 glass-panel p-6 flex items-center gap-6 border-blue-600/20">
                <div class="w-14 h-14 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-500 text-xl">
                    <i class="fa-solid fa-bullhorn"></i>
                </div>
                <div>
                    <h3 class="text-sm font-black uppercase tracking-widest">Marketing Hub</h3>
                    <p class="text-[10px] text-zinc-500 mt-1 uppercase font-bold italic">Promovo biznesin tend</p>
                </div>
                <i class="fa-solid fa-chevron-right ml-auto text-zinc-800"></i>
            </div>
        </div>

        <nav class="dock shadow-2xl">
            <a href="index.html" class="dock-item active"><i class="fa-solid fa-house-chimney"></i></a>
            <a href="builder.html" class="dock-item"><i class="fa-solid fa-plus-square"></i></a>
            <a href="qr-code.html" class="dock-item"><i class="fa-solid fa-qrcode"></i></a>
            <a href="analytics.html" class="dock-item"><i class="fa-solid fa-chart-pie"></i></a>
        </nav>

    </div>

    <script>
        // Mouse/Touch Parallax Effect per Orbs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            gsap.to('#orb1', { x: x * 100, y: y * 100, duration: 2, ease: "power2.out" });
            gsap.to('#orb2', { x: -x * 100, y: -y * 100, duration: 2, ease: "power2.out" });
        });

        // Entrance Animations
        window.onload = () => {
            const tl = gsap.timeline();
            
            tl.from("body", { opacity: 0, duration: 1 })
              .from("header", { y: -30, opacity: 0, duration: 0.8, ease: "expo.out" }, "-=0.5")
              .from("h1", { x: -50, opacity: 0, duration: 1, ease: "expo.out" }, "-=0.5")
              .from(".main-card", { 
                  scale: 0.8, 
                  opacity: 0, 
                  stagger: 0.1, 
                  duration: 1.2, 
                  ease: "expo.out" 
              }, "-=0.8")
              .from(".dock", { y: 100, duration: 1, ease: "expo.out" }, "-=1");
        };

        // Haptic Feedback Simulation (active state)
        document.querySelectorAll('.main-card').forEach(card => {
            card.addEventListener('touchstart', () => {
                gsap.to(card, { scale: 0.95, duration: 0.2 });
            });
            card.addEventListener('touchend', () => {
                gsap.to(card, { scale: 1, duration: 0.2 });
            });
        });
    </script>
</body>
</html>
