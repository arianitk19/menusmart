<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuSmart Data | Real-Time Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>


/* Nav Bar - Spatial Dock (Consistency 10/10) */
.nav-dock {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 450px; height: 80px;
    background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 40px;
    display: flex; justify-content: space-around; align-items: center;
    z-index: 9999; /* Sigurohet që qëndron mbi çdo gjë */
}

.nav-icon { 
    color: #444; font-size: 1.2rem; 
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    display: flex; align-items: center; justify-content: center;
    width: 60px; height: 60px; border-radius: 25px;
}

.nav-icon:hover { color: #fff; background: rgba(255,255,255,0.05); }

.nav-icon.active { 
    color: var(--p); 
    transform: translateY(-8px); 
    background: rgba(255, 92, 0, 0.05);
}

        
        :root { --p: #FF5C00; --bg: #080808; --card: rgba(18, 18, 18, 0.6); }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: #fff; 
            overflow-x: hidden; padding-bottom: 120px;
        }

        /* Ambient Background Background */
        .ambient-glow {
            position: fixed; top: 0; right: 0; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255, 92, 0, 0.05) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        /* UI Elements Consistency */
        .glass-card { 
            background: var(--card); 
            border: 1px solid rgba(255,255,255,0.03); 
            backdrop-filter: blur(40px);
            border-radius: 35px; padding: 30px; 
            transition: transform 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(255,255,255,0.1); }

        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: #444; }
        .stat-value { font-size: 42px; font-weight: 800; letter-spacing: -2px; }

        /* Custom Progress Bar */
        .progress-track { width: 100%; h: 6px; background: #111; border-radius: 100px; overflow: hidden; margin-top: 12px; }
        .progress-fill { height: 100%; background: var(--p); border-radius: 100px; transition: width 1s cubic-bezier(0.23, 1, 0.32, 1); }

        /* Nav Dock */
        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 8px 30px; background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(40px) saturate(150%); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 100px; display: flex; gap: 30px; align-items: center; z-index: 2000;
        }
        .nav-link { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #555; transition: 0.3s; }
        .nav-link.active { color: var(--p); }

        .live-tag {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 4px 12px; background: rgba(255, 92, 0, 0.1);
            border-radius: 100px; font-size: 9px; font-weight: 800; color: var(--p);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">

    <div class="ambient-glow"></div>

    <main class="max-w-5xl mx-auto px-6 pt-12">
        <header class="flex justify-between items-end mb-16">
            <div>
                <p class="text-[10px] font-black tracking-[5px] text-zinc-600 uppercase mb-2">Central Intelligence</p>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter">Data <span class="text-orange-600">Analytics</span></h1>
            </div>
            <div class="text-right">
                <div class="live-tag mb-2"><span class="w-1.5 h-1.5 bg-orange-600 rounded-full animate-ping"></span> Live Feed</div>
                <p class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Përditësuar: Tani</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card border-l-2 border-orange-600">
                <span class="stat-label">Skanime Totale</span>
                <div class="flex items-end gap-2 mt-4">
                    <h3 id="total-scans" class="stat-value tabular-nums">482</h3>
                    <span class="text-green-500 text-xs font-black mb-3">+12%</span>
                </div>
            </div>
            <div class="glass-card">
                <span class="stat-label">Artikuj në Menu</span>
                <div class="flex items-end gap-2 mt-4">
                    <h3 id="total-items-stat" class="stat-value tabular-nums">0</h3>
                </div>
            </div>
            <div class="glass-card">
                <span class="stat-label">Kohëzgjatja Mes.</span>
                <div class="flex items-end gap-2 mt-4">
                    <h3 class="stat-value tabular-nums">4.2</h3>
                    <span class="text-zinc-500 text-xs font-black mb-3">MIN</span>
                </div>
            </div>
        </div>

        <div class="glass-card mb-8">
            <div class="flex justify-between items-center mb-10">
                <h4 class="text-[10px] font-black uppercase tracking-[3px] text-zinc-500">Aktiviteti i Vizitorëve (24h)</h4>
                <div class="flex gap-4">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-orange-600"></span>
                        <span class="text-[9px] font-bold uppercase text-zinc-400">Skanime</span>
                    </div>
                </div>
            </div>
            <div class="h-[350px]">
                <canvas id="liveChart"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card">
                <h4 class="text-[10px] font-black uppercase tracking-[3px] text-zinc-500 mb-8">Peak Performance</h4>
                <div class="space-y-8">
                    <div>
                        <div class="flex justify-between text-[11px] font-black uppercase tracking-widest mb-2">
                            <span>Drekë (12:00 - 15:00)</span>
                            <span class="text-orange-600">45%</span>
                        </div>
                        <div class="progress-track"><div class="progress-fill" style="width: 45%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[11px] font-black uppercase tracking-widest mb-2">
                            <span>Darkë (19:00 - 22:00)</span>
                            <span class="text-orange-600">38%</span>
                        </div>
                        <div class="progress-track"><div class="progress-fill" style="width: 38%"></div></div>
                    </div>
                </div>
            </div>

            <div class="glass-card flex items-center justify-center border-dashed border-zinc-800">
                <div class="text-center">
                    <i class="fa-solid fa-file-export text-zinc-800 text-3xl mb-4"></i>
                    <p class="text-[10px] font-black uppercase tracking-widest text-zinc-600">Export Full Report (PDF)</p>
                </div>
            </div>


<nav class="nav-dock">
    <a href="index.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
    <a href="builder.html" class="nav-icon"><i class="fa-solid fa-cube"></i></a>
    <a href="qr-code.html" class="nav-icon"><i class="fa-solid fa-qrcode"></i></a>
    <a href="analytics.html" class="nav-icon active"><i class="fa-solid fa-chart-bar"></i></a>
</nav>

            
        </div>
    </main>

   
    <script>
        let myChart;

        function initChart() {
            const ctx = document.getElementById('liveChart').getContext('2d');
            const masterData = JSON.parse(localStorage.getItem('menuSmart_MasterData')) || {};
            const pColor = masterData.mainColor || '#FF5C00';

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00'],
                    datasets: [{
                        data: [12, 25, 85, 65, 40, 95, 120, 45],
                        borderColor: pColor,
                        backgroundColor: (context) => {
                            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
                            gradient.addColorStop(0, pColor + '33');
                            gradient.addColorStop(1, 'transparent');
                            return gradient;
                        },
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: pColor,
                        pointHoverBorderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.02)', drawBorder: false },
                            ticks: { color: '#333', font: { size: 10, weight: '800' } }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#333', font: { size: 10, weight: '800' } }
                        }
                    },
                    interaction: { intersect: false, mode: 'index' }
                }
            });
        }

        function refreshData() {
            const raw = localStorage.getItem('menuSmart_MasterData');
            if(raw) {
                const data = JSON.parse(raw);
                
                // Update Items Count
                let totalItems = 0;
                if (data.menu) data.menu.forEach(cat => totalItems += cat.items.length);
                document.getElementById('total-items-stat').innerText = totalItems;

                // Sync Colors
                if(data.mainColor) {
                    document.documentElement.style.setProperty('--p', data.mainColor);
                    myChart.data.datasets[0].borderColor = data.mainColor;
                    myChart.update();
                }
            }
        }

        window.onload = () => {
            initChart();
            refreshData();
            
            // GSAP Animations
            gsap.from(".glass-card", { 
                y: 40, opacity: 0, stagger: 0.15, duration: 1.2, ease: "expo.out" 
            });
            gsap.from(".nav-dock", { 
                y: 100, opacity: 0, duration: 1, delay: 0.8, ease: "expo.out" 
            });
        };
    </script>
</body>
</html>
