<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Forge | MenuSmart PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap" rel="stylesheet">

    <style>
        :root { --p: #FF5C00; --bg: #050505; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }
        
        /* Identike me Studio (Builder) */
        .studio-container { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
        .control-center { background: #0c0c0c; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; padding: 25px; }
        .workspace { background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* QR Card Glassmorphism */
        .qr-card {
            background: #fff; padding: 45px; border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative; transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        .qr-logo-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: white; border-radius: 15px;
            padding: 5px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); border: 2px solid #f0f0f0;
        }

        /* UI Elements nga Builderi */
        .ui-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .ui-input { width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 12px; font-size: 13px; color: #fff; transition: 0.3s; }
        .ui-input:focus { border-color: var(--p); outline: none; }
        
        .btn-main { background: var(--p); color: #fff; font-weight: 800; width: 100%; padding: 18px; border-radius: 15px; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; transition: 0.4s; }
        .btn-main:hover { filter: brightness(1.2); transform: translateY(-2px); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .sync-indicator { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body>

    <div class="studio-container">
        <aside class="control-center no-scrollbar">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-2">
                    <div class="sync-indicator"></div>
                    <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">QR Sync Active</span>
                </div>
                <a href="index.html" class="text-zinc-500 hover:text-white transition"><i class="fa-solid fa-house-user"></i></a>
            </div>

            <div class="ui-card border-l-4 border-orange-600">
                <p class="text-[10px] font-black tracking-[3px] text-zinc-500 uppercase mb-4">Lidhja e Menusë</p>
                <input type="text" id="qr-url" oninput="updateQR()" placeholder="menusmart.io/lokali-juaj" class="ui-input mb-3">
                <p class="text-[9px] text-zinc-600 italic leading-relaxed">Ky kod do të hapë menunë tuaj dixhitale në çdo smartphone.</p>
            </div>

            <div class="ui-card">
                <p class="text-[10px] font-black tracking-[3px] text-zinc-500 uppercase mb-4">Dizajni i Kodit</p>
                <div class="space-y-5">
                    <div class="bg-black p-3 rounded-xl border border-white/5">
                        <span class="text-[8px] block mb-2 opacity-50 uppercase tracking-widest text-zinc-400">Ngjyra e Pixel-ave</span>
                        <input type="color" id="qr-color" value="#000000" oninput="updateQR()" class="w-full h-8 bg-transparent cursor-pointer">
                    </div>
                    <button onclick="document.getElementById('qr-logo-up').click()" class="w-full py-3 bg-zinc-900 border border-white/5 rounded-xl text-[10px] font-bold hover:bg-zinc-800 transition uppercase tracking-tighter">Ndrysho Logon Qendrore</button>
                    <input type="file" id="qr-logo-up" class="hidden" onchange="loadQRLogo(event)">
                </div>
            </div>

            <div class="ui-card bg-orange-600/5 border-orange-600/20">
                <p class="text-[10px] font-black tracking-[3px] text-orange-600 uppercase mb-4">Gati për Printim</p>
                <button onclick="downloadQR()" class="btn-main shadow-2xl shadow-orange-600/20">Shkarko PNG High-Res</button>
            </div>

            <div class="mt-auto pt-6 text-center">
                <a href="builder.html" class="text-zinc-600 hover:text-white text-[10px] font-bold tracking-[2px] uppercase transition">
                    <i class="fa-solid fa-chevron-left mr-2 text-[8px]"></i> Kthehu te Studio
                </a>
            </div>
        </aside>

        <main class="workspace" id="parallax-container">
            <div class="text-center relative">
                <div id="export-target" class="qr-card">
                    <div id="qrcode"></div>
                    <div id="qr-logo-container" class="qr-logo-overlay">
                        <img id="qr-inner-logo" src="https://via.placeholder.com/100" class="w-full h-full object-contain">
                    </div>
                </div>
                
                <div class="mt-12">
                    <h2 id="qr-biz-label" class="text-3xl font-black uppercase tracking-tighter italic scale-up">Business Name</h2>
                    <div class="flex items-center justify-center gap-4 mt-3 opacity-40">
                        <div class="h-[1px] w-12 bg-white"></div>
                        <p class="text-[10px] font-bold tracking-[8px] uppercase">Scan & Order</p>
                        <div class="h-[1px] w-12 bg-white"></div>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-8 right-8 text-[9px] font-bold text-zinc-700 tracking-[4px] uppercase">
                QR Engine v2.0 // Real-time Graphics
            </div>
        </main>
    </div>

    <script src="core-app.js"></script>
    <script>
        let qrCode;

        function loadSyncedData() {
            // Përdorim të dhënat globale nga core-app.js ose MasterData
            const raw = localStorage.getItem('MenuSmart_Global_State') || localStorage.getItem('menuSmart_MasterData');
            if(raw) {
                const data = JSON.parse(raw);
                document.getElementById('qr-biz-label').innerText = data.name || data.bizName || "Business Name";
                
                // Sinkronizojmë ngjyrën kryesore nga Builderi në CSS variablën --p
                if(data.mainColor) {
                    document.documentElement.style.setProperty('--p', data.mainColor);
                }
                
                if(data.logo && data.logo !== "") {
                    document.getElementById('qr-inner-logo').src = data.logo;
                }
            }
        }

        function updateQR() {
            const url = document.getElementById('qr-url').value || "https://menusmart.io/live";
            const color = document.getElementById('qr-color').value;
            
            document.getElementById('qrcode').innerHTML = "";
            qrCode = new QRCode(document.getElementById("qrcode"), {
                text: url,
                width: 280,
                height: 280,
                colorDark : color,
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function loadQRLogo(e) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('qr-inner-logo').src = reader.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        async function downloadQR() {
            const stage = document.getElementById('export-target');
            // Export me rezolucion 4x për printim profesional
            const canvas = await html2canvas(stage, { 
                backgroundColor: null, 
                scale: 4, 
                useCORS: true 
            });
            const link = document.createElement('a');
            link.download = `MenuSmart-QR-${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        // Parallax Effect për Workspace (Identik me ndjesinë e Builder-it)
        document.getElementById('parallax-container').addEventListener('mousemove', (e) => {
            const card = document.querySelector('.qr-card');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        window.onload = () => {
            loadSyncedData();
            updateQR();
            
            // Animacionet hyrëse GSAP (Konsistenca vizuale)
            gsap.from(".qr-card", { scale: 0.7, opacity: 0, duration: 1.2, ease: "expo.out" });
            gsap.from(".control-center", { x: -80, opacity: 0, duration: 0.8, ease: "power2.out" });
        };
    </script>
</body>
</html>
