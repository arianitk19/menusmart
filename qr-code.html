<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Forge | MenuSmart PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap" rel="stylesheet">

    <style>
        :root { --p: #FF5C00; --bg: #050505; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }
        .app-grid { display: grid; grid-template-columns: 400px 1fr; height: 100vh; }
        .sidebar { background: #0a0a0a; border-right: 1px solid rgba(255,255,255,0.05); padding: 40px; overflow-y: auto; }
        .stage { background: radial-gradient(circle at center, #111, #000); display: flex; align-items: center; justify-content: center; position: relative; }
        
        .qr-card {
            background: #fff; padding: 40px; border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .ui-input { background: #151515; border: 1px solid #222; width: 100%; padding: 15px; border-radius: 15px; color: #fff; font-size: 13px; margin-bottom: 20px; }
        
        /* Floating Logo in QR */
        .qr-logo-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 55px; height: 55px; background: white; border-radius: 14px;
            padding: 5px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 2px solid #f0f0f0;
        }

        .btn-download {
            background: var(--p); color: #fff; font-weight: 800; width: 100%;
            padding: 20px; border-radius: 20px; text-transform: uppercase;
            letter-spacing: 2px; font-size: 11px; transition: 0.4s;
        }

        .back-nav { position: absolute; top: 40px; left: 40px; color: #555; font-weight: 800; z-index: 10; transition: 0.3s; }
        .back-nav:hover { color: var(--p); }
    </style>
</head>
<body>

    <a href="builder.html" class="back-nav text-[10px] tracking-[3px]">
        <i class="fas fa-arrow-left mr-2"></i> STUDIO
    </a>

    <div class="app-grid">
        <aside class="sidebar no-scrollbar">
            <div class="mb-12">
                <h1 id="sidebar-biz-name" class="text-2xl font-black tracking-tighter uppercase italic">Menu<span class="text-orange-600">Smart</span></h1>
                <p class="text-zinc-500 text-[10px] font-bold tracking-[3px] mt-2 italic">QR SYNC ENGINE v2</p>
            </div>

            <div class="space-y-8">
                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-3">Destinacioni (URL)</label>
                    <input type="text" id="qr-url" oninput="updateQR()" placeholder="menusmart.io/lokali-juaj" class="ui-input">
                </div>

                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-3">Ngjyra e Kodit</label>
                    <div class="flex gap-4 bg-zinc-900 p-4 rounded-2xl border border-white/5">
                        <input type="color" id="qr-color" value="#000000" oninput="updateQR()" class="w-12 h-12 bg-transparent cursor-pointer">
                        <p class="text-[10px] text-zinc-400 self-center">Përshtate me brendin</p>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-3">Logoja e QR</label>
                    <button onclick="document.getElementById('qr-logo-up').click()" class="w-full py-4 bg-zinc-900 border border-dashed border-zinc-700 rounded-2xl text-[10px] font-bold">NDRYSHO LOGON</button>
                    <input type="file" id="qr-logo-up" class="hidden" onchange="loadQRLogo(event)">
                </div>

                <div class="pt-10">
                    <button onclick="downloadQR()" class="btn-download">SHKARKO FORMATIN 4K (PNG)</button>
                </div>
            </div>
        </aside>

        <main class="stage">
            <div class="text-center">
                <div id="export-target" class="qr-card">
                    <div id="qrcode"></div>
                    <div id="qr-logo-container" class="qr-logo-overlay">
                        <img id="qr-inner-logo" src="https://via.placeholder.com/100" class="w-full h-full object-contain">
                    </div>
                </div>
                <h2 id="qr-biz-label" class="mt-10 text-xl font-black uppercase tracking-tighter">Business Name</h2>
                <p class="text-[9px] font-bold tracking-[8px] text-zinc-600 uppercase mt-2">Digital Menu Access</p>
            </div>
        </main>
    </div>

    <script>
        let qrCode;

        function loadSyncedData() {
            const data = JSON.parse(localStorage.getItem('menuSmart_Data'));
            if(data) {
                if(data.bizName) {
                    document.getElementById('qr-biz-label').innerText = data.bizName;
                    document.getElementById('sidebar-biz-name').innerHTML = `${data.bizName} <span class="text-orange-600">QR</span>`;
                }
                if(data.logo) {
                    document.getElementById('qr-inner-logo').src = data.logo;
                    document.getElementById('qr-logo-container').classList.remove('hidden');
                }
                if(data.brandColor) {
                    document.getElementById('qr-color').value = data.brandColor;
                }
            }
        }

        function updateQR() {
            const url = document.getElementById('qr-url').value || "https://menusmart.io/live";
            const color = document.getElementById('qr-color').value;
            
            document.getElementById('qrcode').innerHTML = "";
            qrCode = new QRCode(document.getElementById("qrcode"), {
                text: url,
                width: 280,
                height: 280,
                colorDark : color,
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function loadQRLogo(e) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('qr-inner-logo').src = reader.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        async function downloadQR() {
            const stage = document.getElementById('export-target');
            const canvas = await html2canvas(stage, { backgroundColor: null, scale: 3 });
            const link = document.createElement('a');
            link.download = 'MenuSmart-QR-Sync.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        window.onload = () => {
            loadSyncedData();
            updateQR();
            
            gsap.from(".qr-card", { scale: 0.5, opacity: 0, duration: 1, ease: "expo.out" });
            gsap.from(".sidebar", { x: -100, opacity: 0, duration: 0.8 });
        };
        
        // Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.qr-card');
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
