<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ndertoje Tani</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

/* 1. ROOT & GLOBAL RESET */
:root { 
    --p: #FF5C00; 
    --bg: #080808; 
    --card: rgba(18, 18, 18, 0.6); 
    --dock-bg: rgba(15, 15, 15, 0.75);
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
}

body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    background: var(--bg); 
    color: #fff; 
    overflow: hidden; 
    height: 100vh;
    height: 100svh; /* Për përputhshmëri me mobile */
    margin: 0;
    -webkit-font-smoothing: antialiased;
}

/* 2. DYNAMIC WORKSPACE GRID */
.studio-container { 
    display: grid; 
    grid-template-columns: 400px 1fr; 
    height: 100vh; 
}

/* 3. CONTROL CENTER (SIDEBAR) */
.control-center { 
    background: #0c0c0c; 
    border-right: 1px solid rgba(255,255,255,0.03); 
    overflow-y: auto; 
    padding: 40px 30px; 
    z-index: 10;
    scrollbar-width: none; /* Firefox */
}
.control-center::-webkit-scrollbar { display: none; }

/* 4. CANVAS CORE (MOCKUP ENGINE) */
.canvas { 
    background: #fff; 
    color: #000; 
    margin: auto;
    position: relative; 
    z-index: 1;
    transform-origin: center center;
    transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1); 
    box-shadow: 0 50px 100px rgba(0,0,0,0.8);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
}

/* View Variants */
.view-mobile { 
    width: 360px; 
    height: 740px; 
    border-radius: 45px; 
    border: 12px solid #161616; 
}

.view-desktop { 
    width: 92%; 
    height: 85%; 
    border-radius: 16px; 
    border: 1px solid rgba(255,255,255,0.05); 
}

.view-a4 { 
    width: 210mm; 
    height: 297mm; 
    border-radius: 0; 
}

/* 5. RESPONSIVE ENGINE (MOBILE APP MODE) */
@media (max-width: 1024px) {
    .studio-container { grid-template-columns: 1fr; }
    .control-center { display: none; } /* Fshihet sidebar në tablet/mobile */
    
    .workspace { background: #fff; } /* Canvas bëhet background-i */
    
    .view-mobile {
        width: 100vw !important;
        height: 100vh !important;
        height: 100svh !important;
        border: none !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding-top: var(--safe-top);
        padding-bottom: var(--safe-bottom);
    }
}

/* 6. NAV DOCK (APPLE STYLE) */
.nav-dock {
    position: fixed; 
    bottom: calc(24px + var(--safe-bottom)); 
    left: 50%; 
    transform: translateX(-50%);
    width: 90%; 
    max-width: 400px; 
    height: 68px; 
    background: var(--dock-bg); 
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.08); 
    border-radius: 34px;
    display: flex; 
    z-index: 9999;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.nav-icon { 
    flex: 1;
    color: rgba(255,255,255,0.4); 
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
    display: flex; 
    flex-direction: column;
    align-items: center; 
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}

.nav-icon.active { color: var(--p); transform: translateY(-4px); }

.nav-icon.active::after {
    content: '';
    position: absolute;
    bottom: 10px;
    width: 4px;
    height: 4px;
    background: var(--p);
    border-radius: 50%;
    filter: drop-shadow(0 0 5px var(--p));
}

/* 7. INTERACTIVE ELEMENTS */
.ui-card { 
    background: var(--card); 
    border: 1px solid rgba(255,255,255,0.04); 
    border-radius: 24px; 
    padding: 24px; 
    margin-bottom: 20px;
    transition: transform 0.2s;
}

.ui-input { 
    width: 100%; 
    background: #000; 
    border: 1px solid #1a1a1a; 
    padding: 14px 18px; 
    border-radius: 14px; 
    font-size: 14px; 
    color: #fff;
    box-sizing: border-box;
}

.ui-input:focus { 
    border-color: var(--p); 
    outline: none; 
    box-shadow: 0 0 0 4px rgba(255, 92, 0, 0.1); 
}

/* FAB BUTTONS */
#fab-main {
    touch-action: manipulation;
    user-select: none;
    box-shadow: 0 12px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#fab-main:active { 
    transform: scale(0.9) translateY(2px); 
    filter: brightness(1.1); 
}

.fab-item {
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.fab-item:active {
    transform: scale(0.92);
    background: var(--p);
}

    </style>
</head>
<body>

    <div class="studio-container">
        <aside class="control-center no-scrollbar">
            <header class="flex items-center justify-between mb-12">
                <div class="sync-tag"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Nis Arkitekturën e Menusë Tënde.</div>
                <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-900 border border-white/5 text-zinc-500 hover:text-white transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
            </header>

            <h2 class="text-xs font-black uppercase tracking-[4px] text-zinc-600 mb-8">Fillo Ndërtimin Profesional →</h2>






<div id="fab-menu">
    <button onclick="printMenu()" class="fab-item" style="background: #2563eb !important;">
        <i class="fa-solid fa-print"></i>
    </button>
</div>

  


            
            <div class="ui-card">
                <span class="ui-label">Përcakto Identitetin</span>
                <input type="text" id="biz-name" oninput="sync()" placeholder="Emri i Biznesit" class="ui-input mb-4">
                <button onclick="document.getElementById('logo-up').click()" class="w-full py-4 border border-zinc-800 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 transition">Ngarko Logon</button>
                <input type="file" id="logo-up" class="hidden" onchange="loadLogo(event)">
            </div>

            <div class="ui-card">
                <span class="ui-label">Aktivizo Studion e Dizajnit →</span>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <span class="text-[8px] font-bold block mb-3 opacity-30 uppercase tracking-widest">Primar</span>
                        <input type="color" id="color-p" value="#FF5C00" oninput="sync()" class="w-full h-10 bg-transparent cursor-pointer rounded-lg overflow-hidden">
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <span class="text-[8px] font-bold block mb-3 opacity-30 uppercase tracking-widest">Teksti</span>
                        <input type="color" id="color-txt" value="#000000" oninput="sync()" class="w-full h-10 bg-transparent cursor-pointer rounded-lg overflow-hidden">
                    </div>
                </div>
            </div>

            <div class="ui-card border-l-2 border-orange-600">
                <span class="ui-label" style="color: var(--p)">Struktura</span>
                <div class="flex gap-2">
                    <input type="text" id="cat-input" placeholder="Kategoria (Psh: Pica)" class="ui-input">
                    <button onclick="addCategory()" class="bg-orange-600 w-16 flex items-center justify-center rounded-xl hover:bg-orange-500 transition"><i class="fa-solid fa-plus text-white"></i></button>
                </div>
            </div>

            <div id="item-panel" class="ui-card hidden">
                <span class="ui-label">Product Entry</span>
                <select id="cat-selector" class="ui-input mb-3 bg-zinc-900 border-none"></select>
                <input type="text" id="item-name" placeholder="Emri i artikullit" class="ui-input mb-3">
                <input type="text" id="item-price" placeholder="Çmimi (€)" class="ui-input mb-4">
                <button onclick="addItem()" class="btn-primary py-4 shadow-xl shadow-orange-600/10">Shto në Menu</button>
            </div>
        </aside>

        <main class="workspace">
            <div class="ambient-glow"></div>

            <div class="absolute top-10 flex gap-4 bg-zinc-900/40 p-2 rounded-2xl border border-white/5 backdrop-blur-2xl z-50">
                <button onclick="changeView('mobile')" id="btn-mobile" class="view-btn active"><i class="fa-solid fa-mobile-screen"></i></button>
                <button onclick="changeView('desktop')" id="btn-desktop" class="view-btn"><i class="fa-solid fa-display"></i></button>
            </div>

            <div id="canvas" class="canvas view-mobile no-scrollbar overflow-y-auto">
                <div class="p-16 text-center">
                    <div id="logo-preview" class="w-24 h-24 mx-auto mb-6 hidden">
                        <img id="p-logo-img" src="" class="w-full h-full object-contain">
                    </div>
                    <h2 id="p-biz-name" class="text-3xl font-black uppercase tracking-tighter italic">Business</h2>
                    <div id="accent-line" class="w-12 h-1.5 bg-orange-600 mx-auto mt-6 rounded-full"></div>
                </div>

                <div id="p-menu" class="px-10 pb-32 space-y-12">
                    <div class="text-center py-20 opacity-10">
                        <i class="fa-solid fa-layer-group text-4xl mb-4"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">Shto Kategoritë për të filluar</p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-10 flex justify-between w-full px-12 opacity-20">
                <span class="text-[9px] font-black tracking-[5px] uppercase">boneMENU - Krejt në nje vend</span>
                <span class="text-[9px] font-black tracking-[5px] uppercase italic">10/10 Precision</span>
            </div>




<div class="fab-container fixed bottom-[120px] right-6 z-[10000]">
    <div id="fab-menu">
        <button onclick="changeView('mobile')" class="fab-item">
            <i class="fa-solid fa-mobile-screen"></i>
        </button>
        <button onclick="changeView('desktop')" class="fab-item">
            <i class="fa-solid fa-display"></i>
        </button>
        <button onclick="changeView('a4')" class="fab-item">
            <i class="fa-solid fa-file-invoice"></i>
        </button>
    </div>
    
    <button id="fab-main" onclick="toggleFab()">
        <i class="fa-solid fa-plus" id="fab-icon"></i>
    </button>
</div>
            
     
          
            

<nav class="nav-dock">
    <a href="index.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
    <a href="builder.html" class="nav-icon active"><i class="fa-solid fa-cube"></i></a>
    <a href="qr-code.html" class="nav-icon"><i class="fa-solid fa-qrcode"></i></a>
    <a href="analytics.html" class="nav-icon"><i class="fa-solid fa-chart-bar"></i></a>
</nav>



            
        </main>
    </div>



    
    <script>
      
/**
 * BONE MENU - High-End SaaS Core Engine
 * Organizuar në një Namespace të vetëm për të shmangur konfliktet.
 */
const MenuApp = {
    // 1. STATE & DATA
    state: {
        menuData: [],
        isFabOpen: false,
        activeView: 'mobile',
        selectors: {
            bizName: () => document.getElementById('biz-name'),
            colorP: () => document.getElementById('color-p'),
            colorTxt: () => document.getElementById('color-txt'),
            canvas: () => document.getElementById('canvas'),
            pMenu: () => document.getElementById('p-menu')
        }
    },

    // 2. CORE SYNC & PERSISTENCE
    // Përdorim debounce që të mos rëndojmë procesorin gjatë shkrimit
    sync: null,

    initSync() {
        this.sync = this.utils.debounce(() => {
            const name = this.state.selectors.bizName().value;
            const pColor = this.state.selectors.colorP().value;
            const txtColor = this.state.selectors.colorTxt().value;
            const logoSrc = document.getElementById('p-logo-img').src;

            // Update UI
            document.getElementById('p-biz-name').innerText = name || "Business Name";
            document.getElementById('accent-line').style.backgroundColor = pColor;
            this.state.selectors.canvas().style.color = txtColor;
            document.documentElement.style.setProperty('--p', pColor);

            // Save to LocalStorage
            const appData = {
                name,
                mainColor: pColor,
                textColor: txtColor,
                logo: logoSrc,
                menu: this.state.menuData
            };
            localStorage.setItem('menuSmart_MasterData', JSON.stringify(appData));
            
            console.log("⚡ Auto-saved & Synced");
        }, 400);
    },

    // 3. ACTION HANDLERS
    actions: {
        addCategory() {
            const input = document.getElementById('cat-input');
            const name = input.value.trim();
            if (!name) return;

            MenuApp.state.menuData.push({ name: name, items: [] });
            input.value = '';
            
            // UI Improvements
            const itemPanel = document.getElementById('item-panel');
            itemPanel.classList.remove('hidden');
            gsap.from(itemPanel, { y: 20, opacity: 0, duration: 0.4, ease: "back.out" });

            MenuApp.ui.updateSelectors();
            MenuApp.ui.render();
            MenuApp.sync();
        },

        addItem() {
            const idx = document.getElementById('cat-selector').value;
            const name = document.getElementById('item-name').value.trim();
            const price = document.getElementById('item-price').value.trim();

            if (!name || !price || idx === "") return;

            MenuApp.state.menuData[idx].items.push({ name, price });
            
            // Pastro inputet
            document.getElementById('item-name').value = '';
            document.getElementById('item-price').value = '';

            MenuApp.ui.render();
            MenuApp.sync();
        },

        loadLogo(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => {
                const img = document.getElementById('p-logo-img');
                img.src = reader.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                MenuApp.sync();
            };
            reader.readAsDataURL(file);
        }
    },

    // 4. UI RENDER ENGINE
    ui: {
        render() {
            const cont = MenuApp.state.selectors.pMenu();
            const pColor = MenuApp.state.selectors.colorP().value;

            if (MenuApp.state.menuData.length === 0) {
                cont.innerHTML = `<div class="text-center py-20 opacity-10 uppercase tracking-widest text-[10px]">Shto Kategoritë</div>`;
                return;
            }

            cont.innerHTML = MenuApp.state.menuData.map(cat => `
                <div class="menu-cat group">
                    <h3 class="font-black border-b-4 inline-block mb-8 uppercase tracking-tighter text-xl italic" 
                        style="border-color: ${pColor}">${cat.name}</h3>
                    <div class="space-y-8">
                        ${cat.items.map(it => `
                            <div class="flex justify-between items-end border-b border-black/5 pb-3">
                                <span class="font-bold text-sm uppercase tracking-tight">${it.name}</span>
                                <span class="font-black text-sm">${it.price}€</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        },

        updateSelectors() {
            const sel = document.getElementById('cat-selector');
            sel.innerHTML = MenuApp.state.menuData.map((c, i) => 
                `<option value="${i}">${c.name}</option>`
            ).join('');
        },

        changeView(type) {
            const canvas = MenuApp.state.selectors.canvas();
            if (!canvas) return;

            // Reset classes
            canvas.classList.remove('view-mobile', 'view-desktop', 'view-a4');
            canvas.classList.add(`view-${type}`);

            // Button Active State
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            const targetBtn = document.getElementById(`btn-${type}`);
            if (targetBtn) targetBtn.classList.add('active');

            // Animation
            gsap.fromTo(canvas, 
                { scale: 0.97, opacity: 0.9 }, 
                { scale: 1, opacity: 1, duration: 0.5, ease: "expo.out", force3D: true }
            );

            if (MenuApp.state.isFabOpen) MenuApp.ui.toggleFab();
            canvas.scrollTo({ top: 0, behavior: 'smooth' });
        },

        toggleFab() {
            const container = document.querySelector('.fab-container');
            const items = document.querySelectorAll('.fab-item');
            const icon = document.getElementById('fab-icon');

            if (!MenuApp.state.isFabOpen) {
                container.classList.add('fab-open');
                gsap.to(icon, { rotation: 45, duration: 0.3 });
                gsap.fromTo(items, 
                    { y: 30, opacity: 0, scale: 0.5 }, 
                    { y: 0, opacity: 1, scale: 1, duration: 0.4, stagger: 0.1, ease: "back.out(1.7)" }
                );
                MenuApp.state.isFabOpen = true;
            } else {
                gsap.to(icon, { rotation: 0, duration: 0.3 });
                gsap.to(items, { 
                    y: 20, opacity: 0, scale: 0.5, duration: 0.3, 
                    onComplete: () => container.classList.remove('fab-open') 
                });
                MenuApp.state.isFabOpen = false;
            }
        }
    },

    // 5. UTILITIES
    utils: {
        debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        },
        print() {
            MenuApp.ui.changeView('a4');
            setTimeout(() => {
                const content = MenuApp.state.selectors.canvas().innerHTML;
                const win = window.open('', '_blank');
                win.document.write(`<html><head><link href="https://cdn.tailwindcss.com" rel="stylesheet"><style>body{padding:20mm}.view-a4{width:210mm;margin:auto}</style></head><body><div class="view-a4">${content}</div></body></html>`);
                win.document.close();
                win.focus();
                setTimeout(() => { win.print(); win.close(); }, 500);
            }, 600);
        }
    }
};

// INITIALIZATION
window.addEventListener('DOMContentLoaded', () => {
    // Start Sync Engine
    MenuApp.initSync();

    // Entrance Animations
    gsap.from(".control-center", { x: -60, opacity: 0, duration: 1, ease: "expo.out" });
    gsap.from(".canvas", { scale: 0.92, opacity: 0, duration: 1.2, delay: 0.2, ease: "expo.out" });

    // Nav-Icon Click Animation
    document.querySelectorAll('.nav-icon').forEach(icon => {
        icon.addEventListener('click', function() {
            gsap.fromTo(this, { scale: 0.8 }, { scale: 1, duration: 0.4, ease: "back.out(2)" });
        });
    });

    // Load saved data if exists
    const saved = localStorage.getItem('menuSmart_MasterData');
    if (saved) {
        const data = JSON.parse(saved);
        MenuApp.state.menuData = data.menu || [];
        document.getElementById('biz-name').value = data.name || "";
        document.getElementById('color-p').value = data.mainColor || "#FF5C00";
        if (data.logo) document.getElementById('p-logo-img').src = data.logo;
        
        MenuApp.ui.updateSelectors();
        MenuApp.ui.render();
        MenuApp.sync(); // Initial sync to apply colors
    }
});

        
        
    </script>
</body>
</html>
