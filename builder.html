<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MenuSmart Studio | Precision Builder</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --p: #FF5C00; --bg: #080808; --card: rgba(18, 18, 18, 0.6); }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            overflow: hidden; 
            height: 100vh;
        }

        /* Studio Grid */
        .studio-container { 
            display: grid; 
            grid-template-columns: 400px 1fr; 
            height: 100vh; 
        }

        /* Side Panel (Control Center) */
        .control-center { 
            background: #0c0c0c; 
            border-right: 1px solid rgba(255,255,255,0.03); 
            overflow-y: auto; 
            padding: 40px 30px; 
            z-index: 10;
        }

        /* Workspace with Ambient Glow */
        .workspace { 
            background: #000; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        .ambient-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: radial-gradient(circle, rgba(255, 92, 0, 0.03) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        /* High-End Canvas Mockups */
        .canvas { 
            background: #fff; 
            color: #000; 
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1); 
            position: relative; 
            z-index: 1;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }
        .view-mobile { width: 360px; height: 740px; border-radius: 50px; border: 12px solid #1a1a1a; }
        .view-desktop { width: 90%; height: 85%; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }

        /* UI Elements Consistency */
        .ui-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-bottom: 12px; display: block; }
        .ui-card { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 30px; padding: 25px; margin-bottom: 24px; }
        
        .ui-input { 
            width: 100%; background: #000; border: 1px solid #1a1a1a; 
            padding: 16px; border-radius: 16px; font-size: 13px; color: #fff;
            transition: all 0.3s;
        }
        .ui-input:focus { border-color: var(--p); outline: none; background: #050505; }

        .btn-primary { 
            width: 100%; py: 16px; background: var(--p); color: #fff; 
            border-radius: 16px; font-weight: 800; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s;
        }
        .btn-primary:active { scale: 0.95; }

        /* Navigation Buttons */
        .view-btn { 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            border-radius: 18px; background: rgba(255,255,255,0.03); color: #555; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .view-btn.active { background: #fff; color: #000; }

        .sync-tag {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 4px 12px; background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.1); border-radius: 100px;
            font-size: 9px; font-weight: 800; color: #22c55e; text-transform: uppercase;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="studio-container">
        <aside class="control-center no-scrollbar">
            <header class="flex items-center justify-between mb-12">
                <div class="sync-tag"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Engine Active</div>
                <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-900 border border-white/5 text-zinc-500 hover:text-white transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
            </header>

            <h2 class="text-xs font-black uppercase tracking-[4px] text-zinc-600 mb-8">Studio Configuration</h2>

            <div class="ui-card">
                <span class="ui-label">Identity</span>
                <input type="text" id="biz-name" oninput="sync()" placeholder="Emri i Biznesit" class="ui-input mb-4">
                <button onclick="document.getElementById('logo-up').click()" class="w-full py-4 border border-zinc-800 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 transition">Ngarko Logon</button>
                <input type="file" id="logo-up" class="hidden" onchange="loadLogo(event)">
            </div>

            <div class="ui-card">
                <span class="ui-label">Visual Aesthetic</span>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <span class="text-[8px] font-bold block mb-3 opacity-30 uppercase tracking-widest">Primary</span>
                        <input type="color" id="color-p" value="#FF5C00" oninput="sync()" class="w-full h-10 bg-transparent cursor-pointer rounded-lg overflow-hidden">
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <span class="text-[8px] font-bold block mb-3 opacity-30 uppercase tracking-widest">Text</span>
                        <input type="color" id="color-txt" value="#000000" oninput="sync()" class="w-full h-10 bg-transparent cursor-pointer rounded-lg overflow-hidden">
                    </div>
                </div>
            </div>

            <div class="ui-card border-l-2 border-orange-600">
                <span class="ui-label" style="color: var(--p)">Structure</span>
                <div class="flex gap-2">
                    <input type="text" id="cat-input" placeholder="Kategoria (Psh: Pica)" class="ui-input">
                    <button onclick="addCategory()" class="bg-orange-600 w-16 flex items-center justify-center rounded-xl hover:bg-orange-500 transition"><i class="fa-solid fa-plus text-white"></i></button>
                </div>
            </div>

            <div id="item-panel" class="ui-card hidden">
                <span class="ui-label">Product Entry</span>
                <select id="cat-selector" class="ui-input mb-3 bg-zinc-900 border-none"></select>
                <input type="text" id="item-name" placeholder="Emri i artikullit" class="ui-input mb-3">
                <input type="text" id="item-price" placeholder="Çmimi (€)" class="ui-input mb-4">
                <button onclick="addItem()" class="btn-primary py-4 shadow-xl shadow-orange-600/10">Shto në Menu</button>
            </div>
        </aside>

        <main class="workspace">
            <div class="ambient-glow"></div>

            <div class="absolute top-10 flex gap-4 bg-zinc-900/40 p-2 rounded-2xl border border-white/5 backdrop-blur-2xl z-50">
                <button onclick="changeView('mobile')" id="btn-mobile" class="view-btn active"><i class="fa-solid fa-mobile-screen"></i></button>
                <button onclick="changeView('desktop')" id="btn-desktop" class="view-btn"><i class="fa-solid fa-display"></i></button>
            </div>

            <div id="canvas" class="canvas view-mobile no-scrollbar overflow-y-auto">
                <div class="p-16 text-center">
                    <div id="logo-preview" class="w-24 h-24 mx-auto mb-6 hidden">
                        <img id="p-logo-img" src="" class="w-full h-full object-contain">
                    </div>
                    <h2 id="p-biz-name" class="text-3xl font-black uppercase tracking-tighter italic">Business</h2>
                    <div id="accent-line" class="w-12 h-1.5 bg-orange-600 mx-auto mt-6 rounded-full"></div>
                </div>

                <div id="p-menu" class="px-10 pb-32 space-y-12">
                    <div class="text-center py-20 opacity-10">
                        <i class="fa-solid fa-layer-group text-4xl mb-4"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">Shto Kategoritë për të filluar</p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-10 flex justify-between w-full px-12 opacity-20">
                <span class="text-[9px] font-black tracking-[5px] uppercase">MenuSmart Architecture</span>
                <span class="text-[9px] font-black tracking-[5px] uppercase italic">10/10 Precision</span>
            </div>





<nav class="nav-dock">
        <a href="index.html" class="nav-link">Home</a>
        <a href="builder.html" class="nav-link active">Studio</a>
        <a href="qr-code.html" class="nav-link">Forge</a>
        <a href="analytics.html" class="nav-link">Data</a>
        <div class="w-[1px] h-4 bg-zinc-800 mx-2"></div>
        <button class="w-8 h-8 rounded-full bg-orange-600 flex items-center justify-center text-[10px] text-white shadow-lg shadow-orange-600/20">
            <i class="fa-solid fa-user"></i>
        </button>
    </nav>

    <style>
        /* Stilimi specifik për Dock-un brenda Builder-it */
        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 8px 30px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 100px;
            display: flex; gap: 30px; align-items: center;
            z-index: 2000; /* Sigurohet që qëndron mbi çdo element tjetër */
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .nav-link {
            font-size: 10px; font-weight: 600; text-transform: uppercase; 
            letter-spacing: 2px; color: #555; transition: all 0.3s;
            text-decoration: none;
        }
        
        .nav-link:hover { color: #fff; }
        .nav-link.active { color: var(--p); }

        /* Rregullim i workspace që dock mos të mbulojë elementet e fundit */
        #p-menu { padding-bottom: 120px !important; }
    </style>

    <script>
        // Shto këtë te pjesa e window.onload ekzistuese për të animuar dock-un
        gsap.from(".nav-dock", { y: 100, opacity: 0, duration: 1, delay: 0.5, ease: "expo.out" });
    </script>

            

            
        </main>
    </div>



    
    <script>
        let menuData = [];

        // SYNC ENGINE - Konsistenca totale me index.html
        function sync() {
            const bizName = document.getElementById('biz-name').value;
            const pColor = document.getElementById('color-p').value;
            const txtColor = document.getElementById('color-txt').value;
            
            document.getElementById('p-biz-name').innerText = bizName || "Business Name";
            document.getElementById('accent-line').style.backgroundColor = pColor;
            document.getElementById('canvas').style.color = txtColor;
            
            // CSS Variable update per UI
            document.documentElement.style.setProperty('--p', pColor);

            const appData = {
                name: bizName,
                mainColor: pColor,
                logo: document.getElementById('p-logo-img').src,
                menu: menuData
            };
            localStorage.setItem('menuSmart_MasterData', JSON.stringify(appData));
        }

        function addCategory() {
            const name = document.getElementById('cat-input').value;
            if(!name) return;
            menuData.push({ name: name, items: [] });
            document.getElementById('cat-input').value = '';
            document.getElementById('item-panel').classList.remove('hidden');
            gsap.from("#item-panel", { y: 20, opacity: 0, duration: 0.5 });
            updateSelectors();
            render();
            sync();
        }

        function updateSelectors() {
            const sel = document.getElementById('cat-selector');
            sel.innerHTML = menuData.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');
        }

        function addItem() {
            const idx = document.getElementById('cat-selector').value;
            const name = document.getElementById('item-name').value;
            const price = document.getElementById('item-price').value;
            if(!name || !price) return;

            menuData[idx].items.push({ name, price });
            document.getElementById('item-name').value = '';
            document.getElementById('item-price').value = '';
            render();
            sync();
        }

        function render() {
            const cont = document.getElementById('p-menu');
            const pColor = document.getElementById('color-p').value;
            
            cont.innerHTML = menuData.map(cat => `
                <div class="menu-cat">
                    <h3 class="font-black border-b-4 border-orange-600 inline-block mb-8 uppercase tracking-tighter text-xl italic" style="border-color: ${pColor}">${cat.name}</h3>
                    <div class="space-y-8">
                        ${cat.items.map(it => `
                            <div class="flex justify-between items-end border-b border-black/5 pb-3">
                                <div class="flex flex-col">
                                    <span class="font-bold text-sm uppercase tracking-tight">${it.name}</span>
                                </div>
                                <span class="font-black text-sm">${it.price}€</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function loadLogo(e) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('p-logo-img').src = reader.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                sync();
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function changeView(type) {
            const canvas = document.getElementById('canvas');
            canvas.className = `canvas no-scrollbar view-${type}`;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            gsap.from(canvas, { scale: 0.98, opacity: 0, duration: 0.6, ease: "expo.out" });
        }

        // Entrance animation
        window.onload = () => {
            gsap.from(".control-center", { x: -100, opacity: 0, duration: 1, ease: "expo.out" });
            gsap.from(".canvas", { scale: 0.9, opacity: 0, duration: 1.2, delay: 0.2, ease: "expo.out" });
        };
    </script>
</body>
</html>
