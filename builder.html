<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuSmart | The Infinite Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap" rel="stylesheet">

    <style>
        :root { --p: #FF5C00; --bg: #050505; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }
        
        .studio-container { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
        .control-center { background: #0c0c0c; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; padding: 25px; }
        .workspace { background: radial-gradient(circle at center, #111 0%, #000 100%); position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* Canvas Mockups */
        .canvas { background: #fff; color: #000; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); position: relative; overflow-y: auto; }
        .view-mobile { width: 340px; height: 680px; border-radius: 45px; box-shadow: 0 0 0 12px #1a1a1a, 0 40px 100px rgba(0,0,0,0.8); }
        .view-desktop { width: 90%; height: 85%; border-radius: 15px; }

        .ui-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .ui-input { width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 12px; font-size: 13px; color: #fff; }
        
        .view-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: #1a1a1a; color: #555; }
        .view-btn.active { background: var(--p); color: #fff; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Pulse for Cloud Sync */
        .sync-indicator { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body>

    <div class="studio-container">
        <aside class="control-center no-scrollbar">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-2">
                    <div class="sync-indicator"></div>
                    <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Live Sync</span>
                </div>
                <a href="index.html" class="text-zinc-500 hover:text-white transition"><i class="fa-solid fa-house-user"></i></a>
            </div>

            <div class="ui-card border-l-4 border-orange-600">
                <p class="text-[10px] font-black tracking-[3px] text-zinc-500 uppercase mb-4">Branding</p>
                <input type="text" id="biz-name" oninput="sync()" placeholder="Emri i Biznesit" class="ui-input mb-4">
                <button onclick="document.getElementById('logo-up').click()" class="w-full py-3 bg-zinc-900 border border-white/5 rounded-xl text-[10px] font-bold hover:bg-zinc-800 transition uppercase">Ngarko Logon</button>
                <input type="file" id="logo-up" class="hidden" onchange="loadLogo(event)">
            </div>

            <div class="ui-card">
                <p class="text-[10px] font-black tracking-[3px] text-zinc-500 uppercase mb-4">Stilizimi</p>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-black p-3 rounded-xl border border-white/5">
                        <span class="text-[8px] block mb-2 opacity-50 uppercase">Ngjyra Kryesore</span>
                        <input type="color" id="color-p" value="#FF5C00" oninput="sync()" class="w-full h-8 bg-transparent cursor-pointer">
                    </div>
                    <div class="bg-black p-3 rounded-xl border border-white/5">
                        <span class="text-[8px] block mb-2 opacity-50 uppercase">Teksti</span>
                        <input type="color" id="color-txt" value="#000000" oninput="sync()" class="w-full h-8 bg-transparent cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="ui-card bg-orange-600/5 border-orange-600/20">
                <p class="text-[10px] font-black tracking-[3px] text-orange-600 uppercase mb-4">Shto Kategoritë</p>
                <div class="flex gap-2">
                    <input type="text" id="cat-input" placeholder="Psh: Pica" class="ui-input">
                    <button onclick="addCategory()" class="bg-orange-600 px-4 rounded-xl"><i class="fa-solid fa-plus text-white"></i></button>
                </div>
            </div>

            <div id="item-panel" class="ui-card hidden animate-in slide-in-from-bottom duration-500">
                <p class="text-[10px] font-black tracking-[3px] text-zinc-500 uppercase mb-4">Shto Artikull</p>
                <select id="cat-selector" class="ui-input mb-3"></select>
                <input type="text" id="item-name" placeholder="Emri i ushqimit" class="ui-input mb-3">
                <input type="text" id="item-price" placeholder="Çmimi (Psh: 5.50)" class="ui-input mb-3">
                <button onclick="addItem()" class="w-full py-3 bg-white text-black font-black text-[10px] rounded-xl uppercase">Shto në Menu</button>
            </div>
        </aside>

        <main class="workspace">
            <div class="absolute top-8 flex gap-3 bg-zinc-900/90 p-2 rounded-2xl border border-white/10 backdrop-blur-xl z-50">
                <button onclick="changeView('mobile')" id="btn-mobile" class="view-btn active"><i class="fa-solid fa-mobile-button"></i></button>
                <button onclick="changeView('desktop')" id="btn-desktop" class="view-btn"><i class="fa-solid fa-laptop"></i></button>
            </div>

            <div id="canvas" class="canvas view-mobile no-scrollbar">
                <div class="p-12 text-center">
                    <div id="logo-preview" class="w-20 h-20 mx-auto mb-4 hidden">
                        <img id="p-logo-img" src="" class="w-full h-full object-contain">
                    </div>
                    <h2 id="p-biz-name" class="text-2xl font-black uppercase tracking-tighter">Business Name</h2>
                    <div id="accent-line" class="w-10 h-1 bg-orange-600 mx-auto mt-4"></div>
                </div>

                <div id="p-menu" class="px-8 pb-24 space-y-10">
                    <div class="text-center py-20 opacity-10">
                        <i class="fa-solid fa-layer-group text-4xl mb-4"></i>
                        <p class="text-[10px] font-bold uppercase tracking-widest">Menuja është bosh</p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-8 right-8 text-[9px] font-bold text-zinc-700 tracking-[4px] uppercase">
                MenuSmart Architecture v2.6
            </div>
        </main>
    </div>

    <script>
        let menuData = [];

        function sync() {
            const bizName = document.getElementById('biz-name').value;
            const pColor = document.getElementById('color-p').value;
            const txtColor = document.getElementById('color-txt').value;
            
            // Update UI
            document.getElementById('p-biz-name').innerText = bizName || "Business Name";
            document.getElementById('accent-line').style.backgroundColor = pColor;
            document.getElementById('canvas').style.color = txtColor;
            
            // Save to LocalStorage for index.html
            const appData = {
                name: bizName,
                mainColor: pColor,
                logo: document.getElementById('p-logo-img').src,
                menu: menuData
            };
            localStorage.setItem('menuSmart_MasterData', JSON.stringify(appData));
        }

        function addCategory() {
            const name = document.getElementById('cat-input').value;
            if(!name) return;
            menuData.push({ name: name, items: [] });
            document.getElementById('cat-input').value = '';
            document.getElementById('item-panel').classList.remove('hidden');
            updateSelectors();
            render();
            sync();
        }

        function updateSelectors() {
            const sel = document.getElementById('cat-selector');
            sel.innerHTML = menuData.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');
        }

        function addItem() {
            const idx = document.getElementById('cat-selector').value;
            const name = document.getElementById('item-name').value;
            const price = document.getElementById('item-price').value;
            if(!name || !price) return;

            menuData[idx].items.push({ name, price });
            document.getElementById('item-name').value = '';
            document.getElementById('item-price').value = '';
            render();
            sync();
        }

        function render() {
            const cont = document.getElementById('p-menu');
            const pColor = document.getElementById('color-p').value;
            
            cont.innerHTML = menuData.map(cat => `
                <div class="animate-in fade-in slide-in-from-right duration-500">
                    <h3 class="font-black border-b-2 border-orange-600 inline-block mb-6 uppercase tracking-tight text-lg" style="border-color: ${pColor}">${cat.name}</h3>
                    <div class="space-y-6">
                        ${cat.items.map(it => `
                            <div class="flex justify-between items-center border-b border-black/5 pb-2">
                                <span class="font-bold text-sm uppercase">${it.name}</span>
                                <span class="font-black text-sm">${it.price}€</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function loadLogo(e) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('p-logo-img').src = reader.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                sync();
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function changeView(type) {
            const canvas = document.getElementById('canvas');
            canvas.className = `canvas no-scrollbar view-${type}`;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            gsap.from(canvas, { scale: 0.95, opacity: 0, duration: 0.5 });
        }
    </script>
</body>
</html>
