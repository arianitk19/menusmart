<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ndertoje Tani</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>



/* Kontenieri */
.fab-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
}

/* Butoni Kryesor: Zezë me Plus të Bardhë */
#fab-main {
    width: 56px;
    height: 56px;
    background: #000000; /* E zezë absolute */
    color: #ffffff; /* Plus i bardhë */
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

#fab-main:active { transform: scale(0.9); }

#fab-icon {
    font-size: 20px;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Menuja e fshehur */
#fab-menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 20px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px) scale(0);
    transform-origin: bottom;
}

/* Butonat e vegjël (Opsionet) */
.fab-item {
    width: 48px;
    height: 48px;
    background: rgba(20, 20, 20, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #ffffff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    cursor: pointer;
}

/* Gjendja Aktive (Kur klasa shtohet me JS) */
.fab-open #fab-menu {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0) scale(1);
}

.fab-open #fab-icon {
    transform: rotate(45deg); /* Plus bëhet X */
}






        


        
        

/* Nav Bar - Spatial Dock (Consistency 10/10) */
.nav-dock {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 450px; height: 80px;
    background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 40px;
    display: flex; justify-content: space-around; align-items: center;
    z-index: 9999; /* Sigurohet që qëndron mbi çdo gjë */
}

.nav-icon { 
    color: #444; font-size: 1.2rem; 
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    display: flex; align-items: center; justify-content: center;
    width: 60px; height: 60px; border-radius: 25px;
}

.nav-icon:hover { color: #fff; background: rgba(255,255,255,0.05); }

.nav-icon.active { 
    color: var(--p); 
    transform: translateY(-8px); 
    background: rgba(255, 92, 0, 0.05);
}
        

        
        :root { --p: #FF5C00; --bg: #080808; --card: rgba(18, 18, 18, 0.6); }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            overflow: hidden; 
            height: 100vh;
        }

        /* Studio Grid */
        .studio-container { 
            display: grid; 
            grid-template-columns: 400px 1fr; 
            height: 100vh; 
        }

        /* Side Panel (Control Center) */
        .control-center { 
            background: #0c0c0c; 
            border-right: 1px solid rgba(255,255,255,0.03); 
            overflow-y: auto; 
            padding: 40px 30px; 
            z-index: 10;
        }

        /* Workspace with Ambient Glow */
        .workspace { 
            background: #000; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        .ambient-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: radial-gradient(circle, rgba(255, 92, 0, 0.03) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        /* High-End Canvas Mockups */
        .canvas { 
            background: #fff; 
            color: #000; 
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1); 
            position: relative; 
            z-index: 1;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }
        .view-mobile { width: 360px; height: 740px; border-radius: 50px; border: 12px solid #1a1a1a; }
        .view-desktop { width: 90%; height: 85%; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }

        /* UI Elements Consistency */
        .ui-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-bottom: 12px; display: block; }
        .ui-card { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 30px; padding: 25px; margin-bottom: 24px; }
        
        .ui-input { 
            width: 100%; background: #000; border: 1px solid #1a1a1a; 
            padding: 16px; border-radius: 16px; font-size: 13px; color: #fff;
            transition: all 0.3s;
        }
        .ui-input:focus { border-color: var(--p); outline: none; background: #050505; }

        .btn-primary { 
            width: 100%; py: 16px; background: var(--p); color: #fff; 
            border-radius: 16px; font-weight: 800; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s;
        }
        .btn-primary:active { scale: 0.95; }

        /* Navigation Buttons */
        .view-btn { 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            border-radius: 18px; background: rgba(255,255,255,0.03); color: #555; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .view-btn.active { background: #fff; color: #000; }

        .sync-tag {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 4px 12px; background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.1); border-radius: 100px;
            font-size: 9px; font-weight: 800; color: #22c55e; text-transform: uppercase;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="studio-container">
        <aside class="control-center no-scrollbar">
            <header class="flex items-center justify-between mb-12">
                <div class="sync-tag"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Nis Arkitekturën e Menusë Tënde.</div>
                <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-900 border border-white/5 text-zinc-500 hover:text-white transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
            </header>

            <h2 class="text-xs font-black uppercase tracking-[4px] text-zinc-600 mb-8">Fillo Ndërtimin Profesional →</h2>








  


            
            <div class="ui-card">
                <span class="ui-label">Përcakto Identitetin</span>
                <input type="text" id="biz-name" oninput="sync()" placeholder="Emri i Biznesit" class="ui-input mb-4">
                <button onclick="document.getElementById('logo-up').click()" class="w-full py-4 border border-zinc-800 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 transition">Ngarko Logon</button>
                <input type="file" id="logo-up" class="hidden" onchange="loadLogo(event)">
            </div>

            <div class="ui-card">
                <span class="ui-label">Aktivizo Studion e Dizajnit →</span>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <span class="text-[8px] font-bold block mb-3 opacity-30 uppercase tracking-widest">Primar</span>
                        <input type="color" id="color-p" value="#FF5C00" oninput="sync()" class="w-full h-10 bg-transparent cursor-pointer rounded-lg overflow-hidden">
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <span class="text-[8px] font-bold block mb-3 opacity-30 uppercase tracking-widest">Teksti</span>
                        <input type="color" id="color-txt" value="#000000" oninput="sync()" class="w-full h-10 bg-transparent cursor-pointer rounded-lg overflow-hidden">
                    </div>
                </div>
            </div>

            <div class="ui-card border-l-2 border-orange-600">
                <span class="ui-label" style="color: var(--p)">Struktura</span>
                <div class="flex gap-2">
                    <input type="text" id="cat-input" placeholder="Kategoria (Psh: Pica)" class="ui-input">
                    <button onclick="addCategory()" class="bg-orange-600 w-16 flex items-center justify-center rounded-xl hover:bg-orange-500 transition"><i class="fa-solid fa-plus text-white"></i></button>
                </div>
            </div>

            <div id="item-panel" class="ui-card hidden">
                <span class="ui-label">Product Entry</span>
                <select id="cat-selector" class="ui-input mb-3 bg-zinc-900 border-none"></select>
                <input type="text" id="item-name" placeholder="Emri i artikullit" class="ui-input mb-3">
                <input type="text" id="item-price" placeholder="Çmimi (€)" class="ui-input mb-4">
                <button onclick="addItem()" class="btn-primary py-4 shadow-xl shadow-orange-600/10">Shto në Menu</button>
            </div>
        </aside>

        <main class="workspace">
            <div class="ambient-glow"></div>

            <div class="absolute top-10 flex gap-4 bg-zinc-900/40 p-2 rounded-2xl border border-white/5 backdrop-blur-2xl z-50">
                <button onclick="changeView('mobile')" id="btn-mobile" class="view-btn active"><i class="fa-solid fa-mobile-screen"></i></button>
                <button onclick="changeView('desktop')" id="btn-desktop" class="view-btn"><i class="fa-solid fa-display"></i></button>
            </div>

            <div id="canvas" class="canvas view-mobile no-scrollbar overflow-y-auto">
                <div class="p-16 text-center">
                    <div id="logo-preview" class="w-24 h-24 mx-auto mb-6 hidden">
                        <img id="p-logo-img" src="" class="w-full h-full object-contain">
                    </div>
                    <h2 id="p-biz-name" class="text-3xl font-black uppercase tracking-tighter italic">Business</h2>
                    <div id="accent-line" class="w-12 h-1.5 bg-orange-600 mx-auto mt-6 rounded-full"></div>
                </div>

                <div id="p-menu" class="px-10 pb-32 space-y-12">
                    <div class="text-center py-20 opacity-10">
                        <i class="fa-solid fa-layer-group text-4xl mb-4"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">Shto Kategoritë për të filluar</p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-10 flex justify-between w-full px-12 opacity-20">
                <span class="text-[9px] font-black tracking-[5px] uppercase">boneMENU - Krejt në nje vend</span>
                <span class="text-[9px] font-black tracking-[5px] uppercase italic">10/10 Precision</span>
            </div>




<div class="fab-container fixed bottom-[120px] right-6 z-[10000]">
    <div id="fab-menu">
        <button onclick="changeView('mobile')" class="fab-item">
            <i class="fa-solid fa-mobile-screen"></i>
        </button>
        <button onclick="changeView('desktop')" class="fab-item">
            <i class="fa-solid fa-display"></i>
        </button>
        <button onclick="changeView('a4')" class="fab-item">
            <i class="fa-solid fa-file-invoice"></i>
        </button>
    </div>
    
    <button id="fab-main" onclick="toggleFab()">
        <i class="fa-solid fa-plus" id="fab-icon"></i>
    </button>
</div>
            
     
          
            

<nav class="nav-dock">
    <a href="index.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
    <a href="builder.html" class="nav-icon active"><i class="fa-solid fa-cube"></i></a>
    <a href="qr-code.html" class="nav-icon"><i class="fa-solid fa-qrcode"></i></a>
    <a href="analytics.html" class="nav-icon"><i class="fa-solid fa-chart-bar"></i></a>
</nav>



            
        </main>
    </div>



    
    <script>
        let menuData = [];

        // SYNC ENGINE - Konsistenca totale me index.html
        function sync() {
            const bizName = document.getElementById('biz-name').value;
            const pColor = document.getElementById('color-p').value;
            const txtColor = document.getElementById('color-txt').value;
            
            document.getElementById('p-biz-name').innerText = bizName || "Business Name";
            document.getElementById('accent-line').style.backgroundColor = pColor;
            document.getElementById('canvas').style.color = txtColor;
            
            // CSS Variable update per UI
            document.documentElement.style.setProperty('--p', pColor);

            const appData = {
                name: bizName,
                mainColor: pColor,
                logo: document.getElementById('p-logo-img').src,
                menu: menuData
            };
            localStorage.setItem('menuSmart_MasterData', JSON.stringify(appData));
        }

        function addCategory() {
            const name = document.getElementById('cat-input').value;
            if(!name) return;
            menuData.push({ name: name, items: [] });
            document.getElementById('cat-input').value = '';
            document.getElementById('item-panel').classList.remove('hidden');
            gsap.from("#item-panel", { y: 20, opacity: 0, duration: 0.5 });
            updateSelectors();
            render();
            sync();
        }

        function updateSelectors() {
            const sel = document.getElementById('cat-selector');
            sel.innerHTML = menuData.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');
        }

        function addItem() {
            const idx = document.getElementById('cat-selector').value;
            const name = document.getElementById('item-name').value;
            const price = document.getElementById('item-price').value;
            if(!name || !price) return;

            menuData[idx].items.push({ name, price });
            document.getElementById('item-name').value = '';
            document.getElementById('item-price').value = '';
            render();
            sync();
        }

        function render() {
            const cont = document.getElementById('p-menu');
            const pColor = document.getElementById('color-p').value;
            
            cont.innerHTML = menuData.map(cat => `
                <div class="menu-cat">
                    <h3 class="font-black border-b-4 border-orange-600 inline-block mb-8 uppercase tracking-tighter text-xl italic" style="border-color: ${pColor}">${cat.name}</h3>
                    <div class="space-y-8">
                        ${cat.items.map(it => `
                            <div class="flex justify-between items-end border-b border-black/5 pb-3">
                                <div class="flex flex-col">
                                    <span class="font-bold text-sm uppercase tracking-tight">${it.name}</span>
                                </div>
                                <span class="font-black text-sm">${it.price}€</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function loadLogo(e) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('p-logo-img').src = reader.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                sync();
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function changeView(type) {
            const canvas = document.getElementById('canvas');
            canvas.className = `canvas no-scrollbar view-${type}`;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            gsap.from(canvas, { scale: 0.98, opacity: 0, duration: 0.6, ease: "expo.out" });
        }



        


 // Entrance animation

        window.onload = () => {

            gsap.from(".control-center", { x: -100, opacity: 0, duration: 1, ease: "expo.out" });

            gsap.from(".canvas", { scale: 0.9, opacity: 0, duration: 1.2, delay: 0.2, ease: "expo.out" });

        };

        




let isFabOpen = false;

function toggleFab() {
    const container = document.querySelector('.fab-container');
    const items = document.querySelectorAll('.fab-item');

    if (!isFabOpen) {
        // HAPJA - Perfeksioni elastik
        container.classList.add('fab-open');
        gsap.fromTo(items, 
            { y: 30, opacity: 0, scale: 0.5 }, 
            { 
                y: 0, 
                opacity: 1, 
                scale: 1, 
                duration: 0.4, 
                stagger: 0.08, 
                ease: "back.out(1.8)" 
            }
        );
        isFabOpen = true;
    } else {
        // MBYLLJA - Zbehje e shpejtë
        gsap.to(items, { 
            y: 20, 
            opacity: 0, 
            scale: 0.5, 
            duration: 0.25, 
            stagger: 0.05,
            ease: "power2.in",
            onComplete: () => {
                container.classList.remove('fab-open');
            }
        });
        isFabOpen = false;
    }
}

// Integrimi me sistemin tënd të changeView
const originalChangeView = typeof changeView === 'function' ? changeView : null;
changeView = function(type) {
    if (originalChangeView) originalChangeView(type);
    
    // Mbyllja automatike pas zgjedhjes
    if (isFabOpen) {
        toggleFab();
    }
};







        




function changeView(type) {
    const canvas = document.getElementById('canvas');
    if (!canvas) return;

    // 1. Pastrojmë klasat e vjetra të pamjes
    canvas.classList.remove('view-mobile', 'view-desktop', 'view-a4');

    // 2. Shtojmë klasën e re bazuar në zgjedhjen
    canvas.classList.add(`view-${type}`);

    // 3. Animacion GSAP për të bërë tranzicionin "Titan"
    gsap.fromTo(canvas, 
        { scale: 0.95, opacity: 0.8 }, 
        { 
            scale: 1, 
            opacity: 1, 
            duration: 0.6, 
            ease: "expo.out" 
        }
    );

    // 4. Mbyllim menunë shpalosëse automatikisht (pasi u krye zgjedhja)
    if (typeof isFabOpen !== 'undefined' && isFabOpen) {
        toggleFab();
    }
}


        

        

        
    </script>
</body>
</html>
