<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ndertoje Tani</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>



/* Dimensionet Inteligjente */
.canvas {
    transform-origin: top center;
    transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    background: white;
    margin: auto;
    position: relative;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch; /* Scroll i lëmuar në iOS */
}

/* Desktop Mockup View */
.view-mobile { 
    width: 360px; 
    height: 740px; 
    border-radius: 45px; 
    border: 12px solid #161616; 
    box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
}

/* Real-Time Mobile App Mode (Kur hapet nga telefoni) */
@media (max-width: 768px) {
    .view-mobile {
        width: 100vw !important;
        height: 100vh !important;
        height: 100svh !important; /* Short Viewport Height për mobile */
        border: none !important;
        border-radius: 0 !important;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
    }
    
    /* Fshehim mbetjet e desktopit në mobile */
    .control-center, .ambient-glow {
        display: none !important;
    }
    
    .studio-container {
        display: block !important;
    }
}

.view-desktop { 
    width: 95%; 
    height: 85%; 
    border-radius: 12px; 
    border: 1px solid rgba(0,0,0,0.1); 
}

.view-a4 { 
    width: 210mm; 
    height: 297mm; 
    border-radius: 0; 
    box-shadow: 0 0 40px rgba(0,0,0,0.2);
}
        


        
/* Update tek butoni kryesor për feedback më të mirë */
#fab-main {
    /* ... kodi yt ekzistues ... */
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    /* Shto një dritë të brendshme (inner glow) */
    box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.2);
}

#fab-main:active { 
    transform: scale(0.88); /* Pak më shumë shtypje */
    filter: brightness(1.2); /* Ndizet pak kur shtypet */
}

/* Update tek opsionet (fab-item) */
.fab-item {
    /* ... kodi yt ekzistues ... */
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* Efekt elastik */
}

.fab-item:active {
    transform: scale(0.9);
    background: var(--p); /* Merr ngjyrën tënde primare kur klikohet */
}





        .nav-dock {
    position: fixed; 
    /* Përdorim calc për të shtuar hapësirën e sigurisë së telefonit */
    bottom: calc(20px + env(safe-area-inset-bottom)); 
    left: 50%; 
    transform: translateX(-50%);
    width: 92%; /* Pak më i gjerë në mobile për stabilitet */
    max-width: 450px; 
    height: 70px; /* Pak më i hollë për estetikë mobile */
    background: rgba(15, 15, 15, 0.75); 
    backdrop-filter: blur(25px) saturate(180%); /* Efekt Apple i pastër */
    -webkit-backdrop-filter: blur(25px) saturate(180%); /* Për Safari/iOS */
    border: 1px solid rgba(255,255,255,0.08); 
    border-radius: 35px;
    display: flex; 
    justify-content: space-around; 
    align-items: center;
    z-index: 9999;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}




        .nav-icon { 
    color: #666; 
    font-size: 1.3rem; 
    position: relative;
    transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); 
    display: flex; 
    flex-direction: column;
    align-items: center; 
    justify-content: center;
    width: 25%; /* Ndarje e barabartë për prekje më të lehtë */
    height: 100%;
    -webkit-tap-highlight-color: transparent;
}

.nav-icon.active { 
    color: var(--p); 
    transform: translateY(-5px); 
}

/* Shto një pikë (indicator) poshtë ikonës aktive */
.nav-icon.active::after {
    content: '';
    position: absolute;
    bottom: 12px;
    width: 4px;
    height: 4px;
    background: var(--p);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--p);
}


        
        



        
        :root { --p: #FF5C00; --bg: #080808; --card: rgba(18, 18, 18, 0.6); }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            overflow: hidden; 
            height: 100vh;
        }

        /* Studio Grid */
        .studio-container { 
            display: grid; 
            grid-template-columns: 400px 1fr; 
            height: 100vh; 
        }

        /* Side Panel (Control Center) */
        .control-center { 
            background: #0c0c0c; 
            border-right: 1px solid rgba(255,255,255,0.03); 
            overflow-y: auto; 
            padding: 40px 30px; 
            z-index: 10;
        }

        /* Workspace with Ambient Glow */
        .workspace { 
            background: #000; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        .ambient-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: radial-gradient(circle, rgba(255, 92, 0, 0.03) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        /* High-End Canvas Mockups */
        .canvas { 
            background: #fff; 
            color: #000; 
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1); 
            position: relative; 
            z-index: 1;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }
        .view-mobile { width: 360px; height: 740px; border-radius: 50px; border: 12px solid #1a1a1a; }
        .view-desktop { width: 90%; height: 85%; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }

        /* UI Elements Consistency */
        .ui-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-bottom: 12px; display: block; }
        .ui-card { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 30px; padding: 25px; margin-bottom: 24px; }
        
        .ui-input { 
            width: 100%; background: #000; border: 1px solid #1a1a1a; 
            padding: 16px; border-radius: 16px; font-size: 13px; color: #fff;
            transition: all 0.3s;
        }
        .ui-input:focus { border-color: var(--p); outline: none; background: #050505; }

        .btn-primary { 
            width: 100%; py: 16px; background: var(--p); color: #fff; 
            border-radius: 16px; font-weight: 800; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s;
        }
        .btn-primary:active { scale: 0.95; }

        /* Navigation Buttons */
        .view-btn { 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            border-radius: 18px; background: rgba(255,255,255,0.03); color: #555; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .view-btn.active { background: #fff; color: #000; }

        .sync-tag {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 4px 12px; background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.1); border-radius: 100px;
            font-size: 9px; font-weight: 800; color: #22c55e; text-transform: uppercase;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

        <aside class="control-center no-scrollbar">
            <header class="flex items-center justify-between mb-12">
                <div class="sync-tag"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Nis Arkitekturën e Menusë Tënde.</div>
                <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-900 border border-white/5 text-zinc-500 hover:text-white transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
            </header>

            <h2 class="text-xs font-black uppercase tracking-[4px] text-zinc-600 mb-8">Fillo Ndërtimin Profesional →</h2>






<div id="fab-menu">
    <button onclick="printMenu()" class="fab-item" style="background: #2563eb !important;">
        <i class="fa-solid fa-print"></i>
    </button>
</div>

  


            
            <div class="ui-card">
                <span class="ui-label">Përcakto Identitetin</span>
                <input type="text" id="biz-name" oninput="sync()" placeholder="Emri i Biznesit" class="ui-input mb-4">
                <button onclick="document.getElementById('logo-up').click()" class="w-full py-4 border border-zinc-800 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 transition">Ngarko Logon</button>
                <input type="file" id="logo-up" class="hidden" onchange="loadLogo(event)">
            </div>

            <div class="ui-card">
                <span class="ui-label">Aktivizo Studion e Dizajnit →</span>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <span class="text-[8px] font-bold block mb-3 opacity-30 uppercase tracking-widest">Primar</span>
                        <input type="color" id="color-p" value="#FF5C00" oninput="sync()" class="w-full h-10 bg-transparent cursor-pointer rounded-lg overflow-hidden">
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <span class="text-[8px] font-bold block mb-3 opacity-30 uppercase tracking-widest">Teksti</span>
                        <input type="color" id="color-txt" value="#000000" oninput="sync()" class="w-full h-10 bg-transparent cursor-pointer rounded-lg overflow-hidden">
                    </div>
                </div>
            </div>

            <div class="ui-card border-l-2 border-orange-600">
                <span class="ui-label" style="color: var(--p)">Struktura</span>
                <div class="flex gap-2">
                    <input type="text" id="cat-input" placeholder="Kategoria (Psh: Pica)" class="ui-input">
                    <button onclick="addCategory()" class="bg-orange-600 w-16 flex items-center justify-center rounded-xl hover:bg-orange-500 transition"><i class="fa-solid fa-plus text-white"></i></button>
                </div>

            <div id="item-panel" class="ui-card hidden">
                <span class="ui-label">Product Entry</span>
                <select id="cat-selector" class="ui-input mb-3 bg-zinc-900 border-none"></select>

            <div class="absolute bottom-10 flex justify-between w-full px-12 opacity-20">

            </div>




<div class="fab-container fixed bottom-[120px] right-6 z-[10000]">
    <div id="fab-menu">
        <button onclick="changeView('mobile')" class="fab-item">
            <i class="fa-solid fa-mobile-screen"></i>
        </button>
        <button onclick="changeView('desktop')" class="fab-item">

<nav class="nav-dock">

    <script>
        let menuData = [];

        // SYNC ENGINE - Konsistenca totale me index.html
        function sync() {
            const bizName = document.getElementById('biz-name').value;
            const pColor = document.getElementById('color-p').value;
            const txtColor = document.getElementById('color-txt').value;
            
            document.getElementById('p-biz-name').innerText = bizName || "Business Name";
            document.getElementById('accent-line').style.backgroundColor = pColor;
            document.getElementById('canvas').style.color = txtColor;
            
            // CSS Variable update per UI
            document.documentElement.style.setProperty('--p', pColor);

            const appData = {
                name: bizName,
                mainColor: pColor,
                logo: document.getElementById('p-logo-img').src,
                menu: menuData
            };
            localStorage.setItem('menuSmart_MasterData', JSON.stringify(appData));
        }

        function addCategory() {
            const name = document.getElementById('cat-input').value;
            if(!name) return;
            menuData.push({ name: name, items: [] });
            document.getElementById('cat-input').value = '';
            document.getElementById('item-panel').classList.remove('hidden');
            gsap.from("#item-panel", { y: 20, opacity: 0, duration: 0.5 });
            updateSelectors();
            render();
            sync();
        }

        function updateSelectors() {
            const sel = document.getElementById('cat-selector');
            sel.innerHTML = menuData.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');
        }

        function addItem() {
            const idx = document.getElementById('cat-selector').value;
            const name = document.getElementById('item-name').value;
            const price = document.getElementById('item-price').value;
            if(!name || !price) return;

            menuData[idx].items.push({ name, price });
            document.getElementById('item-name').value = '';
            document.getElementById('item-price').value = '';
            render();
            sync();
        }

        function render() {
            const cont = document.getElementById('p-menu');
            const pColor = document.getElementById('color-p').value;
            
            cont.innerHTML = menuData.map(cat => `
                <div class="menu-cat">
                    <h3 class="font-black border-b-4 border-orange-600 inline-block mb-8 uppercase tracking-tighter text-xl italic" style="border-color: ${pColor}">${cat.name}</h3>
                    <div class="space-y-8">
                        ${cat.items.map(it => `
                            <div class="flex justify-between items-end border-b border-black/5 pb-3">
                                <div class="flex flex-col">
                                    <span class="font-bold text-sm uppercase tracking-tight">${it.name}</span>
                                </div>
                                <span class="font-black text-sm">${it.price}€</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function loadLogo(e) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('p-logo-img').src = reader.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                sync();
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function changeView(type) {
            const canvas = document.getElementById('canvas');
            canvas.className = `canvas no-scrollbar view-${type}`;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            gsap.from(canvas, { scale: 0.98, opacity: 0, duration: 0.6, ease: "expo.out" });
        }



        


 // Entrance animation

        window.onload = () => {

            gsap.from(".control-center", { x: -100, opacity: 0, duration: 1, ease: "expo.out" });

            gsap.from(".canvas", { scale: 0.9, opacity: 0, duration: 1.2, delay: 0.2, ease: "expo.out" });

        };

        




// Variable globale për të mbajtur gjendjen e menusë
let isFabOpen = false;

/**
 * Funksioni Universal për Ndryshimin e Pamjes
 * @param {string} type - 'mobile', 'desktop', 'a4'
 */
function changeView(type) {
    const canvas = document.getElementById('canvas');
    if (!canvas) return;

    // 1. Menaxhimi i Klasave me Saktësi
    canvas.classList.remove('view-mobile', 'view-desktop', 'view-a4');
    canvas.classList.add(`view-${type}`);

    // 2. Feedback-u Vizual i Butonave (Active State)
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    const targetBtn = document.getElementById(`btn-${type}`);
    if (targetBtn) targetBtn.classList.add('active');

    // 3. Animacioni "Smooth" me Hardware Acceleration
    gsap.fromTo(canvas, 
        { scale: 0.96, opacity: 0.8, y: 10 }, 
        { scale: 1, opacity: 1, y: 0, duration: 0.5, ease: "expo.out", force3D: true }
    );

    // 4. Mbyllja Inteligjente e FAB
    if (isFabOpen) {
        toggleFab();
    }
    
    // 5. Scroll "Smooth" në krye - Esenciale për Mobile
    canvas.scrollTo({ top: 0, behavior: 'smooth' });
}



        function toggleFab() {
    const container = document.querySelector('.fab-container');
    const items = document.querySelectorAll('.fab-item');

    if (!isFabOpen) {
        container.classList.add('fab-open');
        gsap.fromTo(items, 
            { y: 30, opacity: 0, scale: 0.5, rotation: -15 }, 
            { 
                y: 0, opacity: 1, scale: 1, rotation: 0,
                duration: 0.4, stagger: 0.08, ease: "back.out(1.8)" 
            }
        );
        isFabOpen = true;
    } else {
        gsap.to(items, { 
            y: 20, opacity: 0, scale: 0.5, duration: 0.25, 
            stagger: 0.05, ease: "power2.in",
            onComplete: () => container.classList.remove('fab-open')
        });
        isFabOpen = false;
    }
}





        function printMenu() {
    // Kalojmë në A4 për rendering korrekt
    changeView('a4');

    setTimeout(() => {
        const printContent = document.getElementById('canvas').innerHTML;
        const bizName = document.getElementById('p-biz-name').innerText;
        const pColor = getComputedStyle(document.documentElement).getPropertyValue('--p').trim();

        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html>
                <head>
                    <title>Print - ${bizName}</title>
                    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
                    <style>
                        body { background: white; padding: 0; margin: 0; }
                        .view-a4 { width: 210mm; height: 297mm; padding: 20mm; margin: auto; color: black; }
                        @page { size: A4; margin: 0; }
                        .print-accent { color: ${pColor} !important; border-color: ${pColor} !important; }
                    </style>
                </head>
                <body>
                    <div class="view-a4">${printContent}</div>
                    <script>
                        window.onload = () => { window.print(); window.close(); };
                    <\/script>
                </body>
            </html>
        `);
        printWindow.document.close();
    }, 600);
}





document.querySelectorAll('.nav-icon').forEach(icon => {
    icon.addEventListener('click', function() {
        gsap.fromTo(this, 
            { scale: 0.8 }, 
            { scale: 1, duration: 0.4, ease: "back.out(2)" }
        );
    });
});





        
        
    </script>
