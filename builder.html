<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>boneMENU | Studio Profesionale</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=Playfair+Display:ital,wght@0,900;1,900&family=Space+Mono&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --p: #FF5C00; --bg: #080808; --card: rgba(18, 18, 18, 0.6); }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }

        .studio-container { display: grid; grid-template-columns: 400px 1fr; height: 100vh; }

        /* Side Panel */
        .control-center { background: #0c0c0c; border-right: 1px solid rgba(255,255,255,0.03); overflow-y: auto; padding: 40px 30px; z-index: 10; scrollbar-width: none; }
        .control-center::-webkit-scrollbar { display: none; }

        /* Workspace */
        .workspace { background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ambient-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 80%; background: radial-gradient(circle, rgba(255, 92, 0, 0.03) 0%, transparent 70%); z-index: 0; pointer-events: none; }

        /* Canvas Mockups */
        .canvas { background: #fff; color: #000; transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1); position: relative; z-index: 1; box-shadow: 0 50px 100px rgba(0,0,0,0.9); }
        .view-mobile { width: 360px; height: 740px; border-radius: 50px; border: 12px solid #1a1a1a; }
        .view-desktop { width: 90%; height: 85%; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .view-a4 { width: 210mm; height: 297mm; border-radius: 0; box-shadow: 0 0 40px rgba(0,0,0,0.2); }

        /* UI Elements */
        .ui-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-bottom: 12px; display: block; }
        .ui-card { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; padding: 22px; margin-bottom: 20px; transition: 0.3s; }
        .ui-card:hover { border-color: rgba(255,92,0,0.2); }
        .ui-input { width: 100%; background: #000; border: 1px solid #1a1a1a; padding: 14px; border-radius: 14px; font-size: 13px; color: #fff; transition: 0.3s; }
        .ui-input:focus { border-color: var(--p); outline: none; }

        /* Nav & FAB */
        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 70px; background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .nav-icon { color: #555; font-size: 1.2rem; transition: 0.4s; }
        .nav-icon.active { color: var(--p); transform: translateY(-3px); }

        .fab-container { position: fixed; bottom: 120px; right: 30px; z-index: 10000; }
        #fab-main { width: 60px; height: 60px; background: var(--p); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; cursor: pointer; box-shadow: 0 10px 20px rgba(255,92,0,0.3); transition: 0.3s; }
        .fab-item { width: 50px; height: 50px; background: #1a1a1a; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; margin-bottom: 10px; opacity: 0; transform: translateY(20px); transition: 0.3s; pointer-events: none; }
        .fab-open .fab-item { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .sync-tag { display: inline-flex; align-items: center; gap: 8px; padding: 4px 12px; background: rgba(34, 197, 94, 0.05); border: 1px solid rgba(34, 197, 94, 0.1); border-radius: 100px; font-size: 9px; font-weight: 800; color: #22c55e; text-transform: uppercase; }

        /* Button View */
        .view-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 14px; background: rgba(255,255,255,0.03); color: #555; transition: 0.3s; }
        .view-btn.active { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div class="studio-container">
        <aside class="control-center">
            <header class="flex items-center justify-between mb-10">
                <div class="sync-tag"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Studio Live</div>
                <div class="w-8 h-8 rounded-full bg-zinc-900 border border-white/5 flex items-center justify-center text-zinc-500"><i class="fa-solid fa-layer-group text-xs"></i></div>
            </header>

            <div class="ui-card">
                <span class="ui-label">Identiteti i Biznesit</span>
                <input type="text" id="biz-name" oninput="sync()" placeholder="Emri i Biznesit" class="ui-input mb-3">
                <button onclick="document.getElementById('logo-up').click()" class="w-full py-3 border border-zinc-800 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-zinc-800 transition">Ngarko Logon</button>
                <input type="file" id="logo-up" class="hidden" onchange="loadLogo(event)">
            </div>

            <div class="ui-card">
                <span class="ui-label">Dizajni & Ngjyrat</span>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-black p-3 rounded-xl border border-white/5">
                        <span class="text-[7px] font-bold block mb-2 opacity-30 uppercase">Aksenti</span>
                        <input type="color" id="color-p" value="#FF5C00" oninput="sync()" class="w-full h-8 bg-transparent cursor-pointer">
                    </div>
                    <div class="bg-black p-3 rounded-xl border border-white/5">
                        <span class="text-[7px] font-bold block mb-2 opacity-30 uppercase">Sfondi</span>
                        <input type="color" id="color-bg" value="#ffffff" oninput="sync()" class="w-full h-8 bg-transparent cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="ui-card">
                <span class="ui-label">Zgjidh Tipografinë</span>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setFont('Plus Jakarta Sans')" class="py-3 bg-zinc-900 rounded-xl text-[9px] font-bold border border-white/5 hover:border-orange-600 transition">MODERN</button>
                    <button onclick="setFont('Playfair Display')" class="py-3 bg-zinc-900 rounded-xl text-[9px] font-serif border border-white/5 hover:border-orange-600 transition">ELEGANT</button>
                    <button onclick="setFont('Space Mono')" class="py-3 bg-zinc-900 rounded-xl text-[9px] font-mono border border-white/5 hover:border-orange-600 transition">TECH</button>
                    <button onclick="setFont('Inter')" class="py-3 bg-zinc-900 rounded-xl text-[9px] font-bold border border-white/5 hover:border-orange-600 transition">MINIMAL</button>
                </div>
            </div>

            <div class="ui-card">
                <span class="ui-label">Stili i Brendshëm (Interior)</span>
                <select id="interior-style" onchange="sync()" class="ui-input bg-black border-none text-[10px] font-black uppercase tracking-widest">
                    <option value="minimal">Minimal Line</option>
                    <option value="glass">Glass Card (Premium)</option>
                    <option value="bold">Bold Accent</option>
                    <option value="clean">Super Clean</option>
                </select>
            </div>

            <div class="ui-card border-l-4 border-orange-600">
                <span class="ui-label" style="color: var(--p)">Struktura e Menusë</span>
                <div class="flex gap-2">
                    <input type="text" id="cat-input" placeholder="Kategoria (Psh: Pica)" class="ui-input">
                    <button onclick="addCategory()" class="bg-orange-600 w-14 flex items-center justify-center rounded-xl hover:bg-orange-500 transition"><i class="fa-solid fa-plus text-white"></i></button>
                </div>
            </div>

            <div id="item-panel" class="ui-card hidden">
                <span class="ui-label">Detajet e Artikullit</span>
                <select id="cat-selector" class="ui-input mb-3 bg-black border-none"></select>
                <input type="text" id="item-name" placeholder="Emri..." class="ui-input mb-2">
                <input type="text" id="item-desc" placeholder="Përshkrimi i shkurtër..." class="ui-input mb-2 text-[11px]">
                <input type="text" id="item-price" placeholder="Çmimi (€)" class="ui-input mb-4">
                <button onclick="addItem()" class="w-full py-4 bg-white text-black rounded-xl font-black text-[10px] uppercase tracking-widest hover:invert transition">Shto në Menu</button>
            </div>
        </aside>

        <main class="workspace">
            <div class="ambient-glow"></div>

            <div class="absolute top-10 flex gap-4 bg-zinc-900/40 p-2 rounded-2xl border border-white/5 backdrop-blur-2xl z-50">
                <button onclick="changeView('mobile')" id="btn-mobile" class="view-btn active"><i class="fa-solid fa-mobile-screen"></i></button>
                <button onclick="changeView('desktop')" id="btn-desktop" class="view-btn"><i class="fa-solid fa-display"></i></button>
            </div>

            <div id="canvas" class="canvas view-mobile no-scrollbar overflow-y-auto">
                <div class="p-16 text-center">
                    <div id="logo-preview" class="w-20 h-20 mx-auto mb-6 hidden">
                        <img id="p-logo-img" src="" class="w-full h-full object-contain">
                    </div>
                    <h2 id="p-biz-name" class="text-3xl font-black uppercase tracking-tighter italic">Business</h2>
                    <div id="accent-line" class="w-12 h-1.5 bg-orange-600 mx-auto mt-6 rounded-full"></div>
                </div>

                <div id="p-menu" class="px-10 pb-32 space-y-10">
                    <div class="text-center py-20 opacity-10">
                        <i class="fa-solid fa-plus-circle text-4xl mb-4"></i>
                        <p class="text-[9px] font-black uppercase tracking-widest">Krijo kategorinë e parë</p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-10 flex justify-between w-full px-12 opacity-20 pointer-events-none">
                <span class="text-[8px] font-black tracking-[4px] uppercase">boneMENU Studio</span>
                <span class="text-[8px] font-black tracking-[4px] uppercase">v2.0 Precision</span>
            </div>
        </main>
    </div>

    <div class="fab-container">
        <div id="fab-menu" class="flex flex-col items-center">
            <button onclick="printMenu()" class="fab-item" style="background: #2563eb !important;"><i class="fa-solid fa-print"></i></button>
            <button onclick="changeView('a4')" class="fab-item"><i class="fa-solid fa-file-invoice"></i></button>
            <button onclick="localStorage.clear(); location.reload();" class="fab-item" style="background: #dc2626 !important;"><i class="fa-solid fa-trash"></i></button>
        </div>
        <button id="fab-main" onclick="toggleFab()"><i class="fa-solid fa-plus"></i></button>
    </div>

    <nav class="nav-dock">
        <a href="index.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
        <a href="#" class="nav-icon active"><i class="fa-solid fa-cube"></i></a>
        <a href="qr-code.html" class="nav-icon"><i class="fa-solid fa-qrcode"></i></a>
        <a href="analytics.html" class="nav-icon"><i class="fa-solid fa-chart-pie"></i></a>
    </nav>

    <script>
        let menuData = [];
        let isFabOpen = false;

        function sync() {
            const bizName = document.getElementById('biz-name').value;
            const pColor = document.getElementById('color-p').value;
            const bgColor = document.getElementById('color-bg').value;
            
            document.getElementById('p-biz-name').innerText = bizName || "Business Name";
            document.getElementById('accent-line').style.backgroundColor = pColor;
            document.getElementById('canvas').style.backgroundColor = bgColor;
            document.documentElement.style.setProperty('--p', pColor);
            
            render();
        }

        function addCategory() {
            const name = document.getElementById('cat-input').value;
            if(!name) return;
            menuData.push({ name: name, items: [] });
            document.getElementById('cat-input').value = '';
            document.getElementById('item-panel').classList.remove('hidden');
            updateSelectors();
            render();
            sync();
        }

        function updateSelectors() {
            const sel = document.getElementById('cat-selector');
            sel.innerHTML = menuData.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');
        }

        function addItem() {
            const idx = document.getElementById('cat-selector').value;
            const name = document.getElementById('item-name').value;
            const desc = document.getElementById('item-desc').value;
            const price = document.getElementById('item-price').value;
            if(!name || !price) return;

            menuData[idx].items.push({ name, desc, price });
            document.getElementById('item-name').value = '';
            document.getElementById('item-desc').value = '';
            document.getElementById('item-price').value = '';
            render();
            sync();
        }

        function setFont(font) {
            document.getElementById('canvas').style.fontFamily = font;
            sync();
        }

        function render() {
            const cont = document.getElementById('p-menu');
            const pColor = document.getElementById('color-p').value;
            const interior = document.getElementById('interior-style').value;
            
            cont.innerHTML = menuData.map(cat => `
                <div class="menu-cat">
                    <h3 class="font-black border-b-4 inline-block mb-6 uppercase tracking-tighter text-xl italic" style="border-color: ${pColor}">${cat.name}</h3>
                    <div class="space-y-4">
                        ${cat.items.map(it => {
                            if(interior === 'glass') {
                                return `
                                    <div class="p-5 rounded-3xl border border-black/5 bg-white shadow-sm flex justify-between items-center">
                                        <div><span class="font-bold text-sm uppercase block">${it.name}</span><small class="opacity-40 text-[9px]">${it.desc || ''}</small></div>
                                        <span class="font-black text-sm px-3 py-1 bg-zinc-100 rounded-full">${it.price}€</span>
                                    </div>`;
                            } else if(interior === 'bold') {
                                return `
                                    <div class="flex justify-between items-center border-l-4 p-4 bg-zinc-50" style="border-color: ${pColor}">
                                        <span class="font-black text-sm uppercase">${it.name}</span>
                                        <span class="font-black text-sm">${it.price}€</span>
                                    </div>`;
                            } else {
                                return `
                                    <div class="flex justify-between items-end border-b border-black/5 pb-3">
                                        <div class="flex flex-col">
                                            <span class="font-bold text-sm uppercase tracking-tight">${it.name}</span>
                                            <small class="opacity-40 text-[9px]">${it.desc || ''}</small>
                                        </div>
                                        <span class="font-black text-sm">${it.price}€</span>
                                    </div>`;
                            }
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function changeView(type) {
            const canvas = document.getElementById('canvas');
            canvas.className = `canvas no-scrollbar view-${type} overflow-y-auto`;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`btn-${type}`)) document.getElementById(`btn-${type}`).classList.add('active');
            gsap.from(canvas, { scale: 0.98, opacity: 0, duration: 0.4 });
        }

        function toggleFab() {
            const container = document.querySelector('.fab-container');
            isFabOpen = !isFabOpen;
            container.classList.toggle('fab-open', isFabOpen);
            document.getElementById('fab-main').style.transform = isFabOpen ? 'rotate(45deg)' : 'rotate(0)';
        }

        function loadLogo(e) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('p-logo-img').src = reader.result;
                document.getElementById('logo-preview').classList.remove('hidden');
                sync();
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function printMenu() {
            changeView('a4');
            setTimeout(() => { window.print(); }, 500);
        }

        window.onload = () => {
            gsap.from(".control-center", { x: -50, opacity: 0, duration: 1 });
            gsap.from(".canvas", { y: 30, opacity: 0, duration: 1, delay: 0.2 });
        };
    </script>
</body>
</html>
